<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --paper:#F6F2EC; --paper2:#EDE5D4; --card:#FFFFFF; --ink:#142822; --ink2:#1F3A33;
  --sub:#6B7A74; --line:#DCD5C4; --accent:#0E7C66; --accentDark:#0A5E4D; --accentSoft:#E2F0EB;
  --amber:#C97B2A; --amberSoft:#FBEFDC; --protein:#2F6BFF; --carbs:#C97B2A; --fat:#D8546C; --good:#0E7C66;
  --shadow:0 6px 22px rgba(20,40,34,.07); --shadowSticky:0 8px 24px rgba(20,40,34,.10);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;color:var(--ink);font-family:'Inter',system-ui,sans-serif;
  background:radial-gradient(1100px 480px at 50% -120px,#FFFCF6,transparent),var(--paper);padding-bottom:86px}
.wrap{max-width:760px;margin:0 auto;padding:20px 15px 30px}
.disp{font-family:'Oswald',sans-serif}
h1{font-family:'Oswald';font-size:30px;font-weight:700;line-height:1;margin:0;letter-spacing:.5px}
.eyebrow{font-family:'Oswald';font-size:10px;letter-spacing:3px;color:var(--accent);font-weight:600}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:var(--shadow)}
.sechead{font-family:'Oswald';font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin:0 0 12px}
.lbl{font-size:11px;color:var(--sub);font-weight:600;letter-spacing:.4px;margin-bottom:6px;text-transform:uppercase}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.row{display:flex;align-items:center;justify-content:space-between}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input[type=number],input[type=date],input[type=text],textarea{font-family:'Oswald';width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-size:15px;color:var(--ink);background:var(--card)}
input[type=text]{font-family:'Inter'}
.seg{display:flex;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--paper2)}
.seg button{flex:1;padding:9px;font-size:13px;font-weight:600;color:var(--sub);transition:.15s}
.seg button.on{background:var(--accent);color:#fff}
.seg.ink button.on{background:var(--ink);color:#fff}
.opt{text-align:left;padding:10px 12px;border:1.5px solid var(--line);border-radius:12px;background:var(--card);transition:.15s;width:100%}
.opt.on{border-color:var(--accent);background:var(--accentSoft)}
.opt b{font-size:13px;font-weight:600;display:block}
.opt span{font-size:11px;color:var(--sub)}
.stepper{display:flex;align-items:center;border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--card)}
.stepper button{padding:9px 13px;font-size:18px;font-weight:700;color:var(--accent)}
.stepper .val{font-family:'Oswald';flex:1;text-align:center;font-size:18px;padding:8px 4px}
.stepper .val small{font-size:11px;color:var(--sub)}
.cta{width:100%;padding:14px;background:var(--ink);color:#fff;border-radius:12px;font-family:'Oswald';font-size:16px;font-weight:600;letter-spacing:1px;transition:.15s;box-shadow:var(--shadow);margin-bottom:16px}
.cta.accent{background:var(--accent)}
.cta.amber{background:var(--amber)}
.cta.ghost{background:var(--paper2);color:var(--ink);box-shadow:none}
.cta:active{transform:translateY(1px)}
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
.chip{flex:0 0 auto;padding:8px 15px;font-size:13px;font-weight:600;border-radius:99px;border:1px solid var(--line);background:var(--card);color:var(--ink);transition:.15s}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.meal{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 14px;margin-bottom:10px;box-shadow:var(--shadow)}
.macros{font-size:12px;color:var(--sub)}
.macros b{font-family:'Oswald';color:var(--ink)}
.slotlabel{font-size:10px;letter-spacing:1.2px;color:var(--accent);font-weight:700;text-transform:uppercase;margin-bottom:2px}
.pill{padding:9px 14px;border-radius:10px;background:var(--accentSoft);color:var(--accentDark);font-weight:700;font-size:13px;transition:.15s}
.pill.solid{background:var(--accent);color:#fff}
.pill.ghost{background:var(--paper2);color:var(--ink)}

.barbg{height:8px;background:var(--paper2);border-radius:99px;overflow:hidden}
.barfill{height:8px;border-radius:99px;transition:width .35s ease}
.stickbar{position:sticky;top:8px;z-index:5;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:16px;box-shadow:var(--shadowSticky)}
.note{font-size:11px;color:var(--sub);line-height:1.5}

.brand{width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,var(--accent),var(--accentDark));display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:0 6px 18px rgba(14,124,102,.3)}
.optcard{border:1.5px solid var(--line);border-radius:14px;padding:14px;margin-bottom:11px;background:var(--card);box-shadow:var(--shadow);transition:.15s}
.optcard.on{border-color:var(--accent)}
.ghostnum{font-family:'Oswald';font-size:30px;font-weight:700;color:var(--accent);line-height:1}
.mtag{display:inline-flex;font-size:11px;color:var(--sub);background:var(--paper2);border-radius:7px;padding:3px 7px;margin:2px 4px 2px 0}
nav{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;z-index:20;padding:4px 6px}
nav button{flex:1;padding:9px 0 11px;font-size:11px;font-weight:600;color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:3px;border-radius:12px}
nav button.on{color:var(--accent);background:var(--accentSoft)}
.modal-bg{position:fixed;inset:0;background:rgba(20,40,34,.5);z-index:40;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:760px;padding:20px 16px 30px;max-height:90vh;overflow-y:auto}

.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:99px;font-size:13px;font-weight:600;box-shadow:0 8px 24px rgba(20,40,34,.3);z-index:60;opacity:0;transition:opacity .25s}
.toast.show{opacity:1}
</style>

/* ----- math ----- */
const r0=n=>Math.round(n);
const r1=n=>Math.round(n*10)/10;
const lbsOf=kg=>Math.round(kg*2.20462);
const insOf=cm=>Math.round(cm/2.54);
function bmrKatch(kg,bf){const lbm=kg*(1-bf/100);return Math.round(370+21.6*lbm);}
function tdee(bmr,act){return Math.round(bmr*ACTIVITY[act].mult);}
function maxSafeRate(sex,bf,exp,goal){
  if(goal==='maintain')return 0;
  const e=EXP_LEVELS.find(x=>x.key===exp);const base=e.defRate;
  let mod=1;
  if(goal==='lose'){
    if(sex==='male'){if(bf<10)mod=0.4;else if(bf<14)mod=0.6;else if(bf<20)mod=0.85;}
    else{if(bf<18)mod=0.4;else if(bf<22)mod=0.6;else if(bf<28)mod=0.85;}
    return Math.max(0.15,Math.min(1.0,base*mod));
  }
  return e.key==='novice'?0.35:e.key==='intermediate'?0.25:0.2;
}
function proteinTarget(kg,bf,goal){const lbm=kg*(1-bf/100);const g=goal==='lose'?2.6:goal==='gain'?2.4:2.2;return Math.round(g*lbm);}
function buildRegime({goal,exp,sex,bf,weeksLogged}){
  const out=[];
  if(goal==='maintain'){for(let i=0;i<12;i++)out.push({type:'maintain',rate:0,note:'Maintenance'});return out;}
  const max=maxSafeRate(sex,bf,exp,goal);
  const e=EXP_LEVELS.find(x=>x.key===exp);
  const start=Math.max(goal==='lose'?0.15:0.1,max*0.6);
  for(let w=0;w<12;w++){
    const pw=weeksLogged+w;
    const rate=Math.min(max,start+(max-start)*Math.min(1,pw/e.hardenWeeks));
    if(goal==='lose'){
      if(pw>0&&pw%8===0)out.push({type:'diet_break',rate:0,note:'Diet break — full maintenance to restore leptin/T3'});
      else if(pw>0&&pw%3===0)out.push({type:'refeed',rate:rate*0.7,note:'Refeed week — high-carb days at maintenance'});
      else out.push({type:'cut',rate,note:`Active deficit · ${rate.toFixed(2)} kg/wk pace`});
    } else {
      if(pw>0&&pw%6===0)out.push({type:'recalibrate',rate:0,note:'Recalibration week — maintenance to reassess'});
      else out.push({type:'surplus',rate,note:`Lean surplus · ${rate.toFixed(2)} kg/wk pace`});
    }
  }
  return out;
}
function nextPhase({goal,atGoal,weeksLogged,trend}){
  if(atGoal){
    if(goal==='lose')return{key:'reverse',title:'Reverse diet to maintenance',why:"You've hit your fat-loss goal. Jumping straight back to old intake is the #1 cause of rebound. The coach will walk you up ~50–100 kcal/week to maintenance — appetite and metabolic rate need 4–8 weeks to re-normalise.",duration:'4–8 weeks',action:{setGoal:'maintain'}};
    if(goal==='gain')return{key:'minicut',title:'Mini-cut or hold at maintenance',why:"You've hit your build target. A 4–6 week mini-cut now will strip the fat that came with the surplus before bulking again.",duration:'4–8 weeks',action:{setGoal:'lose'}};
    return{key:'continue',title:'Keep going — change the target',why:'Maintenance is the long game. Set a new goal whenever you want a fresh phase.',duration:'ongoing',action:{setGoal:'maintain'}};
  }
  if(weeksLogged>=8&&goal==='lose')return{key:'extend_break',title:'Take a diet break, then continue',why:"You've been in a deficit 8+ weeks. Before extending, the coach inserts a full week at maintenance — MATADOR (Byrne 2018) shows this preserves more lean mass.",duration:'1 week break → 8-week cut block',action:{extend:true}};
  return{key:'extend',title:'Extend your regime by 12 more weeks',why:`Coach continues with the same periodized structure${trend?` (current pace ${trend.toFixed(2)} kg/wk)`:''}.`,duration:'12 more weeks',action:{extend:true}};
}
function thisWeekTarget({bmr,td,wt,manual,sex,kg,goal,bf,checkAdj}){
  let kcal;
  if(wt.type==='diet_break'||wt.type==='recalibrate'||wt.type==='maintain')kcal=td;
  else if(wt.type==='refeed'||wt.type==='cut')kcal=Math.round(td-(wt.rate*1100));
  else if(wt.type==='surplus')kcal=Math.round(td+(wt.rate*1100));
  else kcal=td;
  kcal+=(manual||0)+(checkAdj||0);
  const floor=Math.max(bmr,sex==='male'?1500:1200);
  const floored=kcal<floor;if(floored)kcal=floor;
  const protein=proteinTarget(kg,bf,goal);
  let fat=Math.round(0.25*kcal/9);
  const fatFloor=Math.round(0.6*kg);if(fat<fatFloor)fat=fatFloor;
  const carbs=Math.max(0,Math.round((kcal-protein*4-fat*9)/4));
  return{kcal,protein,carbs,fat,floored,weekType:wt};
}
function checkinAdjustment(checkins,goal){
  const last7=checkins.slice(-7);
  if(last7.length<3)return{delta:0,msg:'Log a few check-ins so the coach can read your recovery.'};
  const avg=k=>last7.reduce((a,c)=>a+c[k],0)/last7.length;
  const h=avg('hunger'),e=avg('energy'),m=avg('mood');
  const poorSleep=last7.filter(c=>c.sleep<6.5).length;
  const stress=h>=4&&(e<=2.2||m<=2.2);
  const sp=poorSleep>=3;
  if(goal==='lose'){
    if(stress&&sp)return{delta:200,msg:'Hunger high, energy/mood low, sleep short — easing the deficit by 200 kcal. Recovery first.'};
    if(stress)return{delta:120,msg:'Hunger up and energy/mood down — softening the deficit by 120 kcal this week.'};
    if(sp)return{delta:80,msg:'Sleep has been short — adding 80 kcal to support recovery.'};
    if(h<=2&&e>=4&&m>=4)return{delta:-80,msg:'All green — coach can push 80 kcal harder if you want to accelerate.'};
  } else if(goal==='gain'){
    if(e<=2&&h<=2)return{delta:-80,msg:'Energy and appetite low — small pullback so you can eat consistently.'};
    if(h>=4&&e>=4)return{delta:60,msg:'Hungry and energetic — coach can lean into +60 kcal.'};
  }
  return{delta:0,msg:'Check-ins look stable. Holding current target.'};
}
function weeklyTrend(log){
  const arr=[...log].sort((a,b)=>a.date.localeCompare(b.date));
  if(arr.length<2)return null;
  const t0=new Date(arr[0].date).getTime();
  const xs=arr.map(e=>(new Date(e.date).getTime()-t0)/86400000),ys=arr.map(e=>e.kg);
  const n=xs.length,sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0);
  const sxx=xs.reduce((a,b)=>a+b*b,0),sxy=xs.reduce((a,b,i)=>a+b*ys[i],0);
  const d=n*sxx-sx*sx;if(d===0)return null;
  return{perWeek:((n*sxy-sx*sy)/d)*7,spanDays:xs[xs.length-1]-xs[0],n};
}

/* ----- entry math (handles meal-library entries, food-database entries, extras) ----- */
const ingScaled=(ing,amt)=>{const f=ing.a>0?amt/ing.a:0;return{kcal:ing.kcal*f,p:ing.p*f,c:ing.c*f,f:ing.f*f};};
const baseTotals=m=>m.ing.reduce((t,ing)=>({kcal:t.kcal+ing.kcal,p:t.p+ing.p,c:t.c+ing.c,f:t.f+ing.f}),{kcal:0,p:0,c:0,f:0});
function entryTotals(e){
  // e.kind: 'meal' (uses MEALS), 'food' (uses macros directly)
  let t={kcal:0,p:0,c:0,f:0};
  if(e.kind==='meal'){
    const m=MEALS[e.slot]?.[e.idx];if(!m)return t;
    t=m.ing.reduce((acc,ing,j)=>{const s=ingScaled(ing,e.amounts[j]??ing.a);return{kcal:acc.kcal+s.kcal,p:acc.p+s.p,c:acc.c+s.c,f:acc.f+s.f};},{kcal:0,p:0,c:0,f:0});
  } else if(e.kind==='food'){
    t={kcal:e.kcal,p:e.p,c:e.c,f:e.f};
  }
  if(Array.isArray(e.extras))e.extras.forEach(x=>{const ex=EXTRAS.find(z=>z.key===x.key);if(!ex)return;const s=ingScaled(ex,x.amount);t.kcal+=s.kcal;t.p+=s.p;t.c+=s.c;t.f+=s.f;});
  return t;
}
function planTotals(arr){return arr.reduce((a,e)=>{const t=entryTotals(e);return{kcal:a.kcal+t.kcal,p:a.p+t.p,c:a.c+t.c,f:a.f+t.f};},{kcal:0,p:0,c:0,f:0});}

/* ----- option (full-day plan) generator ----- */
function buildDay({targetKcal,tag,seed}){
  const layout=[['breakfast',0.22],['lunch',0.28],['snack',0.12],['dinner',0.26],['extra',0.12]];
  const picks=layout.map(([slot,share],i)=>{
    const pool=MEALS[slot].map((m,idx)=>({m,idx})).filter(o=>tag==='all'||o.m.tags.includes(tag));
    const list=pool.length?pool:MEALS[slot].map((m,idx)=>({m,idx}));
    const p=list[(seed+i*2)%list.length];
    const b=baseTotals(p.m);
    const sc=Math.max(0.6,Math.min(1.8,(targetKcal*share)/b.kcal));
    return{slot,idx:p.idx,m:p.m,sc,base:b};
  });
  const dayK=picks.reduce((a,p)=>a+p.base.kcal*p.sc,0);
  const f=Math.max(0.85,Math.min(1.2,targetKcal/dayK));
  return picks.map(p=>({kind:'meal',slot:p.slot,idx:p.idx,extras:[],amounts:p.m.ing.map(ing=>r1(ing.a*p.sc*f))}));
}

  weeksLogged:0,manualAdjust:0,
  weightLog:[],checkins:[],
  options:[],plan:[],dietTag:'all',_seed:1,openEntry:null,
};
function load(){try{return JSON.parse(localStorage.getItem(KEY))||{}}catch(e){return{}}}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(S))}catch(e){}}
let S={...DEFAULTS,...load()};
if(!Array.isArray(S.plan))S.plan=[];
if(!Array.isArray(S.options))S.options=[];
S.plan.forEach(e=>{if(!Array.isArray(e.extras))e.extras=[];if(!e.kind)e.kind='meal';});

/* ----- derived numbers ----- */
function derive(){
  const bf=S.bfMode==='exact'?Math.max(4,Math.min(60,S.bf||15)):(BODY_LEVELS[S.sex].find(b=>b.key===S.bfLevel)||BODY_LEVELS[S.sex][1]).bf;
  const lbm=Math.round(S.kg*(1-bf/100));
  const bmr=bmrKatch(S.kg,bf);
  const td=tdee(bmr,S.activity);
  const regime=buildRegime({goal:S.goal,exp:S.exp,sex:S.sex,bf,weeksLogged:S.weeksLogged});
  const checkAdj=checkinAdjustment(S.checkins,S.goal);
  const wt=regime[0]||{type:'cut',rate:0.3};
  const week=thisWeekTarget({bmr,td,wt,manual:S.manualAdjust,sex:S.sex,kg:S.kg,goal:S.goal,bf,checkAdj:checkAdj.delta});
  let effGoalWeight=S.goalWeight;
  if(S.goal==='lose'&&S.targetMode==='bodyfat')effGoalWeight=Math.round(lbm/(1-S.goalBf/100));
  const trend=weeklyTrend(S.weightLog);
  let eta=null;
  if(S.goal!=='maintain'){
    const cur=S.weightLog.length?S.weightLog[S.weightLog.length-1].kg:S.kg;
    const need=effGoalWeight-cur;
    const wrong=(S.goal==='lose'&&need>0)||(S.goal==='gain'&&need<0);
    if(Math.abs(need)<0.3)eta={reached:true};
    else if(wrong)eta={wrong:true};
    else{
      const rates=regime.map(w=>w.rate||0);const avg=rates.reduce((a,b)=>a+b,0)/rates.length;
      if(avg>0){const weeks=Math.ceil(Math.abs(need)/avg);const date=new Date();date.setDate(date.getDate()+weeks*7);eta={weeks,date};}
    }
  }
  return{bf,lbm,bmr,td,regime,checkAdj,wt,week,effGoalWeight,trend,eta};
}

const $=id=>document.getElementById(id);
function wdisp(kg){return S.units==='metric'?kg+' kg':lbsOf(kg)+' lb';}
function todayStr(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){return d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}
let toastTimer=null;
function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),1800);}

/* ----- routing ----- */
function go(tab){
  S.tab=tab;
  ['home','diet','regime','checkin'].forEach(t=>{$('tab-'+t).style.display=t===tab?'block':'none';$('nav-'+t).className=t===tab?'on':'';});
  render();persist();
}
function set(k,v){S[k]=v;persist();render();}
function setMany(o){Object.assign(S,o);persist();render();}
function adj(k,d,min,max){let v=(S[k]||0)+d;if(min!=null)v=Math.max(min,Math.min(max,v));S[k]=Math.round(v*100)/100;persist();render();}
function setNum(k,v){S[k]=Number(v);persist();render();}

function render(){
  if(S.tab==='home')renderHome();
  else if(S.tab==='diet')renderDiet();
  else if(S.tab==='regime')renderRegime();
  else if(S.tab==='checkin')renderCheckin();
}

function goalDetail(D){
  let out=`<div class="lbl">Aim for</div><div class="seg" style="margin-bottom:12px">${[['weight','Weight'],['bodyfat','Body fat %']].map(([k,l])=>`<button class="${S.targetMode===k?'on':''}" onclick="set('targetMode','${k}')">${l}</button>`).join('')}</div>`;

  } else if(S.targetMode==='bodyfat'&&S.goal==='gain'){
    out+=`<div class="lbl">Don't exceed</div>${stepper('goalBfGain',8,30,'%',S.goalBfGain)}<div class="note" style="margin-top:6px">Coach softens the surplus if you approach this cap.</div>`;

function setGoal(g){
  S.goal=g;

  if(g==='gain'){S.targetMode='weight';if(S.goalWeight<=S.kg)S.goalWeight=S.kg+5;}
  S.manualAdjust=0;persist();render();
}
function startPlan(){S.started=true;persist();toast('Plan updated');render();}
function stepper(k,min,max,suf,val){return `<div class="stepper"><button onclick="adj('${k}',-1,${min},${max})">−</button><div class="val">${val}<small> ${suf}</small></div><button onclick="adj('${k}',1,${min},${max})">+</button></div>`;}

        inner+=`<div class="lbl" style="margin-top:8px;margin-bottom:3px">How to make it</div><ol style="margin:2px 0 0;padding-left:18px">${m.steps.map(s=>`<li style="margin-bottom:2px">${s}</li>`).join('')}</ol></div>`;

    });
    inner+=`<div class="note" style="margin-top:8px">Tap <b>Use ${L}</b> above to load this day — then adjust any meal in "Your day."</div></div>`;
  }
  return `<div class="optcard">${inner}</div>`;
}

      m.ing.forEach((ing,j)=>{const s=ingScaled(ing,e.amounts[j]);const step=UNITSTEP[ing.u]!=null?UNITSTEP[ing.u]:1;
        html+=`<div class="ingrow"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${ing.n}</div><div class="macros">${r0(s.kcal)} kcal · ${r0(s.p)}P ${r0(s.c)}C ${r0(s.f)}F</div></div><div class="amt"><button onclick="nudgeAmt(${i},${j},${-step})">−</button><input type="number" value="${r1(e.amounts[j])}" onchange="setAmt(${i},${j},this.value)"><span class="u">${ing.u||'×'}</span><button onclick="nudgeAmt(${i},${j},${step})">+</button></div></div>`;
      });
    }
    (e.extras||[]).forEach((x,j)=>{const ex=EXTRAS.find(z=>z.key===x.key);if(!ex)return;const s=ingScaled(ex,x.amount);const step=UNITSTEP[ex.u]!=null?UNITSTEP[ex.u]:1;
      html+=`<div class="ingrow" style="background:var(--amberSoft);border-radius:8px;padding:7px 9px;border:none;margin:6px 0"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${ex.n} <span style="color:var(--amber);font-size:11px">· extra</span></div><div class="macros">${r0(s.kcal)} kcal · ${r0(s.p)}P ${r0(s.c)}C ${r0(s.f)}F</div></div><div class="amt"><button onclick="nudgeExtra(${i},${j},${-step})">−</button><input type="number" value="${r1(x.amount)}" onchange="setExtraAmt(${i},${j},this.value)"><span class="u">${ex.u||'×'}</span><button onclick="nudgeExtra(${i},${j},${step})">+</button><button onclick="removeExtra(${i},${j})" style="color:var(--sub);margin-left:4px">✕</button></div></div>`;
    });
    const used=new Set((e.extras||[]).map(x=>x.key));
    const avail=EXTRAS.filter(x=>!used.has(x.key));
    html+=`<div style="margin-top:14px"><div class="lbl" style="margin-bottom:6px">Add an extra ingredient</div><div style="display:flex;flex-wrap:wrap;gap:6px">${avail.length===0?'<span class="note">All extras already added.</span>':avail.map(x=>`<button onclick="addExtra(${i},'${x.key}')" style="padding:6px 11px;font-size:11px;font-weight:600;border-radius:99px;border:1px solid var(--line);background:var(--card);color:var(--ink)">+ ${x.n}</button>`).join('')}</div></div>`;
    if(e.kind==='meal'&&m){
      html+=`<div class="lbl" style="margin:14px 0 2px">How to make it</div><ol style="margin:0;padding-left:18px">${m.steps.map(s=>`<li style="margin-bottom:3px">${s}</li>`).join('')}</ol>`;
    }
    html+=`</div>`;

  html+=`</div>`;

function setDietTag(t){S.dietTag=t;S.options=[];persist();render();}
function generateDays(){

function chooseOption(k){S.plan=JSON.parse(JSON.stringify(S.options[k]));S.plan.forEach(e=>{if(!Array.isArray(e.extras))e.extras=[];if(!e.kind)e.kind='meal';});S.openEntry=null;persist();toast('Plan '+'ABC'[k]+' loaded');render();}
function clearPlan(){S.plan=[];S.openEntry=null;persist();render();}
function toggleExpandOption(k){S.expandedOption=S.expandedOption===k?null:k;S.openOptionMeal=null;persist();render();}
function toggleOptionMeal(id){S.openOptionMeal=S.openOptionMeal===id?null:id;persist();render();}
function addMealFromLib(slot,idx){const m=MEALS[slot][idx];S.plan.push({kind:'meal',slot,idx,extras:[],amounts:m.ing.map(x=>x.a)});persist();toast('Meal added');render();}
function removeEntry(i){S.plan.splice(i,1);if(S.openEntry===i)S.openEntry=null;persist();render();}
function toggleEntry(i){S.openEntry=S.openEntry===i?null:i;persist();render();}
function swapEntry(i){const e=S.plan[i];if(e.kind!=='meal')return;const arr=MEALS[e.slot];e.idx=(e.idx+1)%arr.length;e.amounts=arr[e.idx].ing.map(x=>x.a);e.extras=[];persist();toast('Swapped');render();}
function setAmt(i,j,val){let v=Number(val);if(isNaN(v)||v<0)v=0;S.plan[i].amounts[j]=Math.round(v*100)/100;persist();render();}
function nudgeAmt(i,j,d){let v=(S.plan[i].amounts[j]||0)+d;if(v<0)v=0;S.plan[i].amounts[j]=Math.round(v*100)/100;persist();render();}
function portionEntry(i,f){S.plan[i].amounts=S.plan[i].amounts.map(a=>Math.round(a*f*100)/100);persist();render();}
function addExtra(i,key){const ex=EXTRAS.find(x=>x.key===key);if(!ex)return;if(!Array.isArray(S.plan[i].extras))S.plan[i].extras=[];S.plan[i].extras.push({key,amount:ex.a});persist();render();}
function setExtraAmt(i,j,val){let v=Number(val);if(isNaN(v)||v<0)v=0;S.plan[i].extras[j].amount=Math.round(v*100)/100;persist();render();}
function nudgeExtra(i,j,d){let v=(S.plan[i].extras[j].amount||0)+d;if(v<0)v=0;S.plan[i].extras[j].amount=Math.round(v*100)/100;persist();render();}
function removeExtra(i,j){S.plan[i].extras.splice(j,1);persist();render();}

      <div class="lbl">Meal slot</div>
      <div class="seg" style="margin-bottom:14px">${SLOTS.map(s=>`<button class="${picker.slot===s?'on':''}" onclick="pickerSetSlot('${s}')">${SLOT_LABEL[s]}</button>`).join('')}</div>

      <div class="chips" style="margin-bottom:12px">${cats.map(c=>`<button class="chip ${picker.cat===c?'on':''}" onclick="pickerSetCat('${c}')">${c==='all'?'All':c}</button>`).join('')}</div>

function pickerSetQuery(v){picker.query=v;renderPicker();}
function pickerSetCat(c){picker.cat=c;renderPicker();}
function pickerSelect(i){picker.sel=FOODS[i];picker.amount=FOODS[i].u==='100g'?100:FOODS[i].u==='ml'?100:1;renderPicker();}
function pickerBack(){picker.sel=null;renderPicker();}
function pickerSetSlot(s){picker.slot=s;renderPicker();}

  const f=picker.sel;const a=picker.amount;

  const D=derive();

    </div>
  </div>

  });

    <div class="disp" style="font-size:11px;letter-spacing:1px;color:var(--sub);font-weight:700">BEYOND WEEK 12</div>

    <div style="font-size:13px;line-height:1.55;margin-bottom:10px">${phase.why}</div>
    <div style="font-size:12px;color:var(--sub);margin-bottom:12px">Suggested duration: <b style="color:var(--ink)">${phase.duration}</b></div>
    <button class="cta amber" onclick="applyPhase('${phase.action.setGoal||''}',${phase.action.extend?'true':'false'})" style="margin:0">${phase.key.startsWith('extend')?'EXTEND MY REGIME':'START THIS PHASE'}</button>
  </div>
  <div class="note" style="margin-top:14px">Sources: Trexler 2014; Müller & Bosy-Westphal 2013; Byrne 2018 (MATADOR); Garthe 2013; Helms 2014. Coaching guidance, not medical advice.</div>`;

}
function slider(k){
  return `<div style="display:flex;gap:6px">${[1,2,3,4,5].map(n=>`<button onclick="chk['${k}']=${n};render()" style="flex:1;padding:11px;font-size:14px;font-weight:700;border-radius:10px;background:${chk[k]===n?'var(--accent)':'var(--paper2)'};color:${chk[k]===n?'#fff':'var(--sub)'};transition:.15s">${n}</button>`).join('')}</div>`;
}
function submitCheckin(){
  const d=chk.date||todayStr();
  S.checkins=S.checkins.filter(c=>c.date!==d).concat({hunger:chk.hunger,energy:chk.energy,mood:chk.mood,sleep:chk.sleep,date:d});
  S.checkins.sort((a,b)=>a.date.localeCompare(b.date));
  if(chk.w){let w=Number(chk.w);if(S.units==='imperial')w=w/2.20462;
    S.weightLog=S.weightLog.filter(e=>e.date!==d).concat({date:d,kg:Math.round(w*10)/10});
    S.weightLog.sort((a,b)=>a.date.localeCompare(b.date));
    S.kg=Math.round(w);
  }
  chk.w='';persist();toast('Check-in saved');render();
}

/* boot */
go(S.tab||'home');
</script>
</body>
