function pickerSetQuery(v){picker.query=v;renderPicker();}
function pickerSetCat(c){picker.cat=c;renderPicker();}
function pickerSelect(i){picker.sel=FOODS[i];picker.amount=FOODS[i].u==='100g'?100:FOODS[i].u==='ml'?100:1;renderPicker();}
function pickerBack(){picker.sel=null;renderPicker();}
function pickerSetSlot(s){picker.slot=s;renderPicker();}
function pickerSetAmount(v){picker.amount=Math.max(0,Number(v)||0);renderPicker();}
function pickerStep(){const u=picker.sel.u;return u==='100g'?10:u==='ml'?25:1;}
function pickerAdj(d){picker.amount=Math.max(0,Math.round((picker.amount+d)*10)/10);renderPicker();}
function pickerAdd(){
  const f=picker.sel;const a=picker.amount;
  const factor=f.u==='100g'?a/100:f.u==='ml'?a/100:a;
  const displayAmount=f.u==='100g'?a+'g':f.u==='ml'?a+'ml':a+'× '+(f.size||'unit');
  const kcal = f.kcal*factor;
  const pp = f.p*factor, cc = f.c*factor, ff = f.f*factor;
  // Stepwise mode: enforce the slot range
  if (picker.stepwise && S.builderMode==='stepwise'){
    const D = derive();
    const r = slotRange(picker.slot, D);
    if (kcal < r.min || kcal > r.max){
      // Open 4-option modal. Close the food picker first.
      const slot = picker.slot;
      const foodPayload = { food: f, amount: a, displayAmount, kcal, p: pp, c: cc, f: ff };
      closePicker();
      showOutOfRangeModal({
        kind: 'food', slot, foodPayload,
        requestedKcal: kcal, requestedP: pp, requestedC: cc, requestedF: ff,
        range: r,
      });
      return;
    }
  }
  const newEntry={kind:'food',slot:picker.slot,name:f.n,displayAmount,extras:[],locked:true,
    kcal:kcal,p:pp,c:cc,f:ff};
  const existing=S.plan.findIndex(e=>e.slot===picker.slot);
  let msg;
  if(existing>=0){S.plan[existing]=newEntry;msg=SLOT_LABEL[picker.slot]+' replaced — rest of day rebalancing';}
  else{S.plan.push(newEntry);msg='Added to '+SLOT_LABEL[picker.slot];}
  S.openEntry=null;
  if (S.builderMode !== 'stepwise') rebalanceUnlocked();
  persist();closePicker();toast(msg);render();
}

      <button class="cta accent" style="margin:0" onclick="showAuthScreen()">Sign in or create account</button>`;
  } else {
    h += `<div class="note">Local-only mode. Cloud sync isn't configured for this copy of the app — your data is safe on this device but won't follow you to another phone or browser. (The app's owner can flip this on in the source.)</div>`;
  }
  h += `</div>`;

  /* ---- appearance & preferences ---- */
  h += `<div class="card">
    <div class="row" style="margin-bottom:10px"><span class="disp" style="font-size:12px;letter-spacing:1.5px;color:var(--sub);font-weight:600">APPEARANCE</span></div>
    <div class="lbl">Theme</div>
    <div class="seg" style="margin-bottom:12px">${[['light','Light'],['dark','Dark'],['auto','Auto']].map(([k,l])=>`<button class="${S.theme===k?'on':''}" onclick="setTheme('${k}')">${l}</button>`).join('')}</div>
    <div class="lbl">Daily water goal</div>
    <div class="stepper"><button onclick="adj('waterGoalMl',-250,1000,5000)">−</button><div class="val">${S.waterGoalMl}<small> ml</small></div><button onclick="adj('waterGoalMl',250,1000,5000)">+</button></div>
  </div>`;

  /* ---- saved meals ---- */
  if (S.savedMeals && S.savedMeals.length) {
    h += `<div class="card">
      <div class="row" style="margin-bottom:10px"><span class="disp" style="font-size:12px;letter-spacing:1.5px;color:var(--sub);font-weight:600">MY SAVED MEALS · ${S.savedMeals.length}</span></div>`;
    S.savedMeals.forEach(m => {
      h += `<div class="ingrow" style="padding:10px 0"><div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600">${m.name}</div>
        <div class="macros">${r0(m.kcal)} kcal · ${r0(m.p)}P ${r0(m.c)}C ${r0(m.f)}F · ${SLOT_LABEL[m.slot]||m.slot}</div>
      </div><button onclick="deleteSavedMeal('${m.id}')" style="color:var(--sub);font-size:18px;padding:0 6px">✕</button></div>`;
    });
    h += `</div>`;
  }

  /* ---- progress stats ---- */
  h += `<div class="grid3" style="margin-bottom:16px">
    ${statBox(wdisp(S.kg),'Current')}
    ${statBox(change==null?'—':((change>=0?'+':'')+r1(change)+(S.units==='metric'?' kg':' lb')),'Change')}
    ${statBox(bfNow+'%','Body fat')}
  </div>
  <div class="grid3" style="margin-bottom:16px">
    ${statBox(trend?((trend.perWeek>=0?'+':'')+trend.perWeek.toFixed(2)+' kg/wk'):'—','7-day pace')}
    ${statBox(streak+' day'+(streak===1?'':'s'),'Check-in streak')}
    ${statBox(wlog.length+' / '+checkins.length,'Weigh-ins / check-ins')}
  </div>`;

  /* ---- weight chart ---- */
  if (wlog.length>=2) {
    h += `<div class="card"><div class="sechead" style="margin-bottom:8px">Weight trend</div>${weightChartSVG(wlog)}</div>`;
  } else {
    h += `<div class="card" style="text-align:center"><div class="sechead" style="margin-bottom:6px">Weight trend</div><div class="note">Log at least 2 weigh-ins on the Check-in tab to see your trend chart.</div></div>`;
  }

  /* ---- bf trend (derived) ---- */
  if (bfHistory.length>=2) {
    h += `<div class="card"><div class="sechead" style="margin-bottom:8px">Estimated body fat % over time</div>${bfChartSVG(bfHistory)}<div class="note" style="margin-top:8px">Estimated assuming lean mass stays roughly constant. Real bf% needs calipers, DEXA, or a smart scale.</div></div>`;
  }

  /* ---- weigh-in history ---- */
  if (wlog.length) {
    h += `<div class="sechead">Weigh-in history</div>`;
    [...wlog].reverse().slice(0,30).forEach(w=>{
      h += `<div class="meal"><div class="row"><div><div style="font-size:13px;font-weight:600">${wdisp(w.kg)}</div><div class="macros">${w.date}</div></div></div></div>`;
    });
  }

  /* ---- data export ---- */
  h += `<div class="card" style="margin-top:12px">
    <div class="sechead" style="margin-bottom:8px">Your data</div>
    <div class="note" style="margin-bottom:10px">Download a backup of everything you've logged. You can keep it safe or import it on another device.</div>
    <button class="cta ghost" style="margin:0 0 8px" onclick="exportData()">Export my data (.json)</button>
    <button class="cta ghost" style="margin:0" onclick="document.getElementById('import-file').click()">Import data file</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  </div>`;

  $('tab-settings').innerHTML = h;
}
function statBox(val,label){
  return `<div class="card" style="padding:12px;margin:0;text-align:center"><div class="disp" style="font-size:20px;font-weight:700;line-height:1">${val}</div><div class="lbl" style="margin:4px 0 0">${label}</div></div>`;
}
function weightChartSVG(log){
  const W=600,H=200,pad=32;
  const t0=new Date(log[0].date).getTime();
  const xs=log.map(e=>(new Date(e.date).getTime()-t0)/86400000);
  const ys=log.map(e=>e.kg);
  const xmax=Math.max(...xs,1),ymin=Math.min(...ys)-0.6,ymax=Math.max(...ys)+0.6;
  const X=x=>pad+(x/xmax)*(W-pad*1.4),Y=y=>H-pad-((y-ymin)/(ymax-ymin))*(H-pad*1.7);
  const pts=log.map((_,i)=>X(xs[i])+','+Y(ys[i])).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <line x1="${pad}" y1="${Y(ymin)}" x2="${W-12}" y2="${Y(ymin)}" stroke="var(--line)"/>
    <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
    ${log.map((_,i)=>`<circle cx="${X(xs[i])}" cy="${Y(ys[i])}" r="4" fill="#fff" stroke="var(--accent)" stroke-width="2.5"/>`).join('')}
    <text x="${pad}" y="15" font-family="Inter" font-size="11" fill="var(--sub)">${ys[0].toFixed(1)} → ${ys[ys.length-1].toFixed(1)} kg</text>
    <text x="${W-12}" y="15" font-family="Inter" font-size="11" fill="var(--sub)" text-anchor="end">${log.length} entries</text>
  </svg>`;
}
function bfChartSVG(log){
  const W=600,H=180,pad=32;
  const t0=new Date(log[0].date).getTime();
  const xs=log.map(e=>(new Date(e.date).getTime()-t0)/86400000);
  const ys=log.map(e=>e.bf);
  const xmax=Math.max(...xs,1),ymin=Math.min(...ys)-1,ymax=Math.max(...ys)+1;
  const X=x=>pad+(x/xmax)*(W-pad*1.4),Y=y=>H-pad-((y-ymin)/(ymax-ymin))*(H-pad*1.7);
  const pts=log.map((_,i)=>X(xs[i])+','+Y(ys[i])).join(' ');
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
    <polyline points="${pts}" fill="none" stroke="var(--amber)" stroke-width="2.5" stroke-linejoin="round"/>
    ${log.map((_,i)=>`<circle cx="${X(xs[i])}" cy="${Y(ys[i])}" r="3.5" fill="#fff" stroke="var(--amber)" stroke-width="2"/>`).join('')}
    <text x="${pad}" y="15" font-family="Inter" font-size="11" fill="var(--sub)">${ys[0].toFixed(1)}% → ${ys[ys.length-1].toFixed(1)}%</text>
  </svg>`;
}

/* ---- export / import ---- */
function exportData(){
  const blob = new Blob([JSON.stringify(S,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'ye-diet-backup-'+todayStr()+'.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
}
function importData(evt){
  const file = evt.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported || typeof imported !== 'object') throw new Error('invalid');
      if (!confirm('Replace your current data with this backup? Your present data will be overwritten.')) return;
      S = { ...DEFAULTS, ...imported };
      persist(); render();
      toast('Data imported');
    } catch(err) { alert('That file does not look like a valid Ye Diet backup.'); }
  };
  reader.readAsText(file);
}

/* ===================== AUTH UI ===================== */
let authMode = 'signin';   // 'signin' | 'signup'
let authBusy = false;
let authMsg = null;

function showAuthScreen(){
  authMsg = null; renderAuth();
}
function hideAuthScreen(){
  document.getElementById('auth-root').innerHTML = '';
}
function renderAuth(){
  const el = document.getElementById('auth-root');
  if (!CLOUD_ENABLED) { el.innerHTML=''; return; }
  if (authMode === 'reset') return renderResetRequest();
  if (authMode === 'newpw') return renderNewPassword();
  el.innerHTML = `<div class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand"><span class="disp" style="font-size:22px;font-weight:700">Y</span></div>
        <div><div class="eyebrow">YOUR NUTRITION COACH</div><h1 style="font-size:24px">YE DIET</h1></div>
      </div>
      <div class="note" style="text-align:center;margin-bottom:18px">Sign in to sync your plan, meals, and progress across devices.</div>
      <div class="auth-tab">
        <button class="${authMode==='signin'?'on':''}" onclick="setAuthMode('signin')">Sign in</button>
        <button class="${authMode==='signup'?'on':''}" onclick="setAuthMode('signup')">Create account</button>
      </div>
      ${authMsg?`<div class="auth-status ${authMsg.kind}">${authMsg.text}</div>`:''}
      <div class="lbl">Email</div>
      <input type="text" id="auth-email" placeholder="you@example.com" autocomplete="email" style="margin-bottom:12px">
      <div class="lbl">Password</div>
      <input type="password" id="auth-pass" placeholder="${authMode==='signup'?'min 6 characters':'your password'}" autocomplete="${authMode==='signup'?'new-password':'current-password'}" style="margin-bottom:14px">
      <button class="cta accent" onclick="doAuth()" ${authBusy?'disabled':''} style="margin:0">${authBusy?'Working…':(authMode==='signin'?'SIGN IN':'CREATE ACCOUNT')}</button>
      ${authMode==='signin'?`<div style="text-align:center;margin-top:10px"><button onclick="setAuthMode('reset')" style="font-size:12px;color:var(--accent);font-weight:600">Forgot password?</button></div>`:''}
      <div style="text-align:center;margin-top:12px"><button onclick="continueOffline()" style="font-size:12px;color:var(--sub);text-decoration:underline">Skip — use locally without an account</button></div>
    </div>
  </div>`;
}

function renderResetRequest(){
  const el = document.getElementById('auth-root');
  el.innerHTML = `<div class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand"><span class="disp" style="font-size:22px;font-weight:700">Y</span></div>
        <div><div class="eyebrow">YOUR NUTRITION COACH</div><h1 style="font-size:24px">YE DIET</h1></div>
      </div>
      <div class="disp" style="font-size:16px;font-weight:600;text-align:center;margin-bottom:6px">Reset your password</div>
      <div class="note" style="text-align:center;margin-bottom:16px">Enter your email and we'll send you a link to set a new password.</div>
      ${authMsg?`<div class="auth-status ${authMsg.kind}">${authMsg.text}</div>`:''}
      <div class="lbl">Email</div>
      <input type="text" id="auth-email" placeholder="you@example.com" autocomplete="email" style="margin-bottom:14px">
      <button class="cta accent" onclick="doPasswordReset()" ${authBusy?'disabled':''} style="margin:0">${authBusy?'Sending…':'SEND RESET LINK'}</button>
      <div style="text-align:center;margin-top:12px"><button onclick="setAuthMode('signin')" style="font-size:12px;color:var(--sub);font-weight:600">← Back to sign in</button></div>
    </div>
  </div>`;
}

function renderNewPassword(){
  const el = document.getElementById('auth-root');
  el.innerHTML = `<div class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="brand"><span class="disp" style="font-size:22px;font-weight:700">Y</span></div>
        <div><div class="eyebrow">YOUR NUTRITION COACH</div><h1 style="font-size:24px">YE DIET</h1></div>
      </div>
      <div class="disp" style="font-size:16px;font-weight:600;text-align:center;margin-bottom:6px">Set a new password</div>
      <div class="note" style="text-align:center;margin-bottom:16px">You followed a reset link. Choose a new password to finish.</div>
      ${authMsg?`<div class="auth-status ${authMsg.kind}">${authMsg.text}</div>`:''}
      <div class="lbl">New password</div>
      <input type="password" id="auth-newpw" placeholder="min 6 characters" autocomplete="new-password" style="margin-bottom:14px">
      <button class="cta accent" onclick="doSetNewPassword()" ${authBusy?'disabled':''} style="margin:0">${authBusy?'Saving…':'SAVE NEW PASSWORD'}</button>
    </div>
  </div>`;
}

function setAuthMode(m){ authMode=m; authMsg=null; renderAuth(); }

async function doPasswordReset(){
  const email = document.getElementById('auth-email').value.trim();
  if (!email) { authMsg={kind:'err',text:'Enter your email first.'}; renderAuth(); return; }
  authBusy = true; renderAuth();
  try {
    // Tell Supabase where to send users after they click the email
    const redirectTo = window.location.origin + window.location.pathname;
    const { error } = await supa.auth.resetPasswordForEmail(email, { redirectTo });
    if (error) throw error;
    authBusy = false;
    authMsg = { kind:'ok', text:'Check your email for a reset link. Open it on this device and you\'ll come back here to set a new password.' };
    renderAuth();
  } catch(e) {
    authBusy = false;
    authMsg = { kind:'err', text: e.message || 'Could not send reset email.' };
    renderAuth();
  }
}

async function doSetNewPassword(){
  const pw = document.getElementById('auth-newpw').value;
  if (!pw || pw.length < 6) { authMsg={kind:'err',text:'Password needs at least 6 characters.'}; renderAuth(); return; }
  authBusy = true; renderAuth();
  try {
    const { data, error } = await supa.auth.updateUser({ password: pw });
    if (error) throw error;
    currentUser = { id: data.user.id, email: data.user.email };
    const cloudData = await cloudLoad();
    if (cloudData) { S = { ...DEFAULTS, ...cloudData }; migrateState(); }
    authBusy = false; hideAuthScreen();
    setSyncPill('cloud');
    toast('Password updated — you are signed in.');
    render();
  } catch(e) {
    authBusy = false;
    authMsg = { kind:'err', text: e.message || 'Could not set new password.' };
    renderAuth();
  }
}

async function doAuth(){
  const email = document.getElementById('auth-email').value.trim();
  const pass = document.getElementById('auth-pass').value;
  if (!email || !pass) { authMsg={kind:'err',text:'Email and password required.'}; renderAuth(); return; }
  if (authMode==='signup' && pass.length<6) { authMsg={kind:'err',text:'Password needs at least 6 characters.'}; renderAuth(); return; }
  authBusy = true; renderAuth();
  try {
    let res;
    if (authMode==='signup') res = await supa.auth.signUp({ email, password: pass });
    else                     res = await supa.auth.signInWithPassword({ email, password: pass });
    if (res.error) throw res.error;
    if (authMode==='signup' && res.data.user && !res.data.session) {
      authBusy = false;
      authMsg = { kind:'ok', text: 'Account created. Check your email for a confirmation link, then sign in.' };
      authMode='signin'; renderAuth();
      return;
    }
    currentUser = { id: res.data.user.id, email: res.data.user.email };
    // hydrate from cloud
    const cloudData = await cloudLoad();
    if (cloudData) {
      S = { ...DEFAULTS, ...cloudData };
      migrateState();
    } else {
      // first sign-in: push current local data to cloud
      await cloudSave(S);
    }
    authBusy = false; hideAuthScreen();
    setSyncPill('cloud');
    toast('Signed in as '+currentUser.email);
    render();
  } catch(e) {
    authBusy = false;
    authMsg = { kind:'err', text: e.message || 'Sign-in failed.' };
    renderAuth();
  }
}
function continueOffline(){
  hideAuthScreen();
  setSyncPill('local');
}
async function doSignOut(){
  if (!supa) return;
  if (!confirm('Sign out? Your data stays in the cloud and will load again next time you sign in.')) return;
  await supa.auth.signOut();
  currentUser = null;
  setSyncPill('local');
  toast('Signed out');
  render();
}

/* ===================== BOOT ===================== */
async function boot(){
  // Apply saved theme
  applyTheme(S.theme || 'auto');
  // Try to restore an existing Supabase session
  if (supa) {
    const { data } = await supa.auth.getSession();
    if (data?.session) {
      currentUser = { id: data.session.user.id, email: data.session.user.email };
      const cloudData = await cloudLoad();
      if (cloudData) { S = { ...DEFAULTS, ...cloudData }; migrateState(); }
      setSyncPill('cloud');
    } else {
      // not signed in — show auth (skippable)
      showAuthScreen();
      setSyncPill('local');
    }
    // listen for sign-in/out events and password-recovery
    supa.auth.onAuthStateChange((event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // user clicked the reset link in email — show new-password screen
        authMode = 'newpw'; authMsg = null;
        showAuthScreen();
        return;
      }
      if (session?.user) {
        currentUser = { id: session.user.id, email: session.user.email };
        setSyncPill('cloud');
      } else {
        currentUser = null;
        setSyncPill('local');
      }
    });
    // Auto-refresh on window focus (cross-device sync without WebSocket flakiness on iPad)
    window.addEventListener('focus', async () => {
      if (!currentUser) return;
      const cloud = await cloudLoad();
      if (cloud) {
        // Only apply if cloud is *newer* than local
        const cloudUpd = cloud._updatedAt ? new Date(cloud._updatedAt).getTime() : 0;
        const localUpd = S._updatedAt ? new Date(S._updatedAt).getTime() : 0;
        if (cloudUpd > localUpd) { S = { ...DEFAULTS, ...cloud }; migrateState(); applyTheme(S.theme||'auto'); render(); }
      }
    });
  } else {
    setSyncPill('local');
  }
  runOnboardingIfNew();
  go(S.tab||'home');
}
boot();
</script>
