const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN3cnhwdnV2d3BtdnB6aGNxZm93Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTExNDMsImV4cCI6MjA5ODA2NzE0M30.WMGQbTYebx9wZn3JIANMiYD-lBzFrJLFtY7fQR03sco";

const CLOUD_ENABLED = SUPABASE_URL.startsWith("https://") && SUPABASE_ANON.length > 20;
let supa = null;
if (CLOUD_ENABLED && window.supabase) {
  supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ---- auth state ---- */
let currentUser = null;   // { id, email } when signed in
let syncBusy = false;
let pendingSave = false;
let saveTimer = null;

function setSyncPill(state){
  const el = document.getElementById('sync-pill');
  if (!CLOUD_ENABLED) { el.style.display='none'; return; }
  el.style.display='block';
  el.className = 'sync-pill ' + (state||'');
  el.textContent = state==='busy' ? 'Syncing…'
                 : state==='cloud' ? '☁ Synced'
                 : 'Local';
}

async function cloudLoad(){
  if (!supa || !currentUser) return null;
  setSyncPill('busy');
  const { data, error } = await supa.from('user_data').select('data').eq('user_id', currentUser.id).maybeSingle();
  setSyncPill(currentUser ? 'cloud' : 'local');
  if (error) { console.warn('cloudLoad:', error.message); return null; }
  return data ? data.data : null;
}
async function cloudSave(stateObj){
  if (!supa || !currentUser) return;
  if (syncBusy) {
    // A save is already in flight — mark that another one is needed.
    // When the current save completes it will re-run with the latest S.
    pendingSave = true;
    return;
  }
  syncBusy = true;
  setSyncPill('busy');
  const payload = { user_id: currentUser.id, data: stateObj, updated_at: new Date().toISOString() };
  const { error } = await supa.from('user_data').upsert(payload, { onConflict: 'user_id' });
  syncBusy = false;
  setSyncPill(error ? 'local' : 'cloud');
  if (error) console.warn('cloudSave:', error.message);
  // If a save was queued while we were busy, run it now with the latest state.
  if (pendingSave) { pendingSave = false; cloudSave(S); }
}

/* persist() is called everywhere. We debounce cloud syncs to avoid spam. */
function scheduleCloudSave(){
  if (!supa || !currentUser) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => cloudSave(S), 800);
}

const COMPONENT_CATS = ['Protein','Carbs','Fats','Veg'];

function componentMacros(comp, amount){

/* ----- math ----- */
const r0=n=>Math.round(n);
const r1=n=>Math.round(n*10)/10;
const escapeHTML = s => String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
const lbsOf=kg=>Math.round(kg*2.20462);

function tdee(bmr,act){return Math.round(bmr*ACTIVITY[act].mult);}
function maxSafeRate(sex,bf,exp,goal){
  if(goal==='maintain')return 0;
  const e=EXP_LEVELS.find(x=>x.key===exp);const base=e.defRate;
  let mod=1;
  if(goal==='lose'){
    if(sex==='male'){if(bf<10)mod=0.4;else if(bf<14)mod=0.6;else if(bf<20)mod=0.85;}
    else{if(bf<18)mod=0.4;else if(bf<22)mod=0.6;else if(bf<28)mod=0.85;}
    return Math.max(0.15,Math.min(1.0,base*mod));

}
function proteinTarget(kg,bf,goal){const lbm=kg*(1-bf/100);const g=goal==='lose'?2.6:goal==='gain'?2.4:2.2;return Math.round(g*lbm);}
function buildRegime({goal,exp,sex,bf,weeksLogged}){
  const out=[];
  if(goal==='maintain'){for(let i=0;i<12;i++)out.push({type:'maintain',rate:0,note:'Maintenance'});return out;}
  const max=maxSafeRate(sex,bf,exp,goal);
  const e=EXP_LEVELS.find(x=>x.key===exp);
  const start=Math.max(goal==='lose'?0.15:0.1,max*0.6);
  for(let w=0;w<12;w++){
    const pw=weeksLogged+w;
    const rate=Math.min(max,start+(max-start)*Math.min(1,pw/e.hardenWeeks));
    if(goal==='lose'){
      if(pw>0&&pw%8===0)out.push({type:'diet_break',rate:0,note:'Diet break — full maintenance to restore leptin/T3'});
      else if(pw>0&&pw%3===0)out.push({type:'refeed',rate:rate*0.7,note:'Refeed week — high-carb days at maintenance'});
      else out.push({type:'cut',rate,note:`Active deficit · ${rate.toFixed(2)} kg/wk pace`});
    } else {
      if(pw>0&&pw%6===0)out.push({type:'recalibrate',rate:0,note:'Recalibration week — maintenance to reassess'});
      else out.push({type:'surplus',rate,note:`Lean surplus · ${rate.toFixed(2)} kg/wk pace`});
    }
  }
  return out;
}
function nextPhase({goal,atGoal,weeksLogged,trend}){

    if(goal==='gain')return{key:'minicut',title:'Mini-cut or hold at maintenance',why:"You've hit your build target. A 4–6 week mini-cut now will strip the fat that came with the surplus before bulking again.",duration:'4–8 weeks',action:{setGoal:'lose'}};
    return{key:'continue',title:'Keep going — change the target',why:'Maintenance is the long game. Set a new goal whenever you want a fresh phase.',duration:'ongoing',action:{setGoal:'maintain'}};
  }

  return{key:'extend',title:'Extend your regime by 12 more weeks',why:`Coach continues with the same periodized structure${trend?` (current pace ${trend.toFixed(2)} kg/wk)`:''}.`,duration:'12 more weeks',action:{extend:true}};
}

/* ===================== TIME-GOAL FEASIBILITY =====================
   Given the user's body + goal + a requested weeks-to-goal, returns a verdict:
   - green:  the required pace is at or below the SAFE ceiling for their body
   - amber:  above safe but at/below the AGGRESSIVE ceiling
   - red:    above the aggressive ceiling (dangerous / muscle-loss territory)
   Ceilings (weight loss, per week):
     safe        = min(1% of bodyweight, 0.7 kg)
     aggressive  = min(1.5% of bodyweight, 1.0 kg)
   Higher body-fat lets us push harder — the safe ceiling scales up to 1.2%
   at 30%+ bf and the aggressive ceiling to 2.0%.
   For muscle GAIN (lean bulk):
     safe        = 0.25 kg/wk (novice) → 0.35 kg/wk (intermediate) → 0.20 kg/wk (advanced)
     aggressive  = 0.40 kg/wk regardless (past this, most gains are fat).
*/
function timeGoalFeasibility(D){
  if (S.goal === 'maintain') return null;
  if (!S.goalWeeks || S.goalWeeks <= 0) return null;

  const cur = S.weightLog.length ? S.weightLog[S.weightLog.length-1].kg : S.kg;
  const targetKg = D.effGoalWeight;
  const needKg = Math.abs(targetKg - cur);
  if (needKg < 0.3) return { verdict:'reached' };

  const wrongDir = (S.goal==='lose' && targetKg > cur) || (S.goal==='gain' && targetKg < cur);
  if (wrongDir) return { verdict:'wrongdir' };

  const requiredPace = needKg / S.goalWeeks;

  // Ceilings
  let safeCeiling, aggressiveCeiling;
  if (S.goal === 'lose') {
    const bf = D.bf;
    // Higher body-fat means faster loss is safer (more fat stores as fuel)
    const safePctBw = bf >= 30 ? 0.012 : bf >= 20 ? 0.010 : bf >= 15 ? 0.008 : 0.006;
    const aggPctBw = bf >= 30 ? 0.020 : bf >= 20 ? 0.015 : bf >= 15 ? 0.012 : 0.009;
    safeCeiling = Math.min(safePctBw * cur, bf >= 25 ? 1.0 : 0.7);
    aggressiveCeiling = Math.min(aggPctBw * cur, bf >= 25 ? 1.5 : 1.0);
  } else {
    // Gain
    const byExp = { novice:0.30, intermediate:0.20, advanced:0.15 };
    safeCeiling = byExp[S.exp] || 0.25;
    aggressiveCeiling = 0.40;
  }

  let verdict;
  if (requiredPace <= safeCeiling) verdict = 'green';
  else if (requiredPace <= aggressiveCeiling) verdict = 'amber';
  else verdict = 'red';

  // Earliest comfortable date (green): needKg / safeCeiling
  const safeWeeks = Math.ceil(needKg / safeCeiling);
  const aggressiveWeeks = Math.ceil(needKg / aggressiveCeiling);

  // Alternative goal (weight or bf%) that hits requested date at safe pace
  const kgReachableSafely = safeCeiling * S.goalWeeks;
  let altGoalKg;
  if (S.goal === 'lose') altGoalKg = Math.max(cur - kgReachableSafely, cur * 0.85);
  else altGoalKg = cur + kgReachableSafely;

  // If bodyfat target, translate the alt weight back to a bf%
  let altGoalBf = null;
  if (S.targetMode === 'bodyfat' && S.goal === 'lose') {
    // if lean mass stays, bf% at altGoalKg:
    const bfAt = Math.max(3, Math.min(60, (1 - D.lbm / altGoalKg) * 100));
    altGoalBf = Math.round(bfAt);
  }

  return {
    verdict,
    requiredPace: Math.round(requiredPace*100)/100,
    safeCeiling: Math.round(safeCeiling*100)/100,
    aggressiveCeiling: Math.round(aggressiveCeiling*100)/100,
    safeWeeks, aggressiveWeeks,
    altGoalKg: Math.round(altGoalKg*10)/10,
    altGoalBf,
    needKg: Math.round(needKg*10)/10,
    cur,
    targetKg,
  };
}
function goalAcceptHarderPace(){
  if (!confirm("Coach will tighten the deficit to chase your date. Hunger and mood will be harder. You can undo this any time. Continue?")) return;
  const D = derive();
  const f = timeGoalFeasibility(D);
  if (!f || f.verdict !== 'amber') return;
  // Compute additional kcal deficit needed to match required pace vs safe pace
  const extraKgPerWeek = f.requiredPace - f.safeCeiling;
  // ~7700 kcal per kg of fat, so extra deficit per day = extraKg * 7700 / 7
  const extraKcalPerDay = Math.round(extraKgPerWeek * 7700 / 7);
  S.manualAdjust = (S.manualAdjust || 0) - extraKcalPerDay;
  S.goalPaceAccepted = true;
  persist(); toast('Deficit tightened by '+extraKcalPerDay+' kcal/day'); render();
}
function goalPushDate(){
  const D = derive();
  const f = timeGoalFeasibility(D);
  if (!f) return;
  S.goalWeeks = f.safeWeeks;
  S.goalPaceAccepted = false;
  // reset any prior tightening
  if (S.manualAdjust < 0) S.manualAdjust = 0;
  persist(); toast('Date pushed to '+f.safeWeeks+' weeks — comfortable pace'); render();
}
function goalLowerTarget(){
  const D = derive();
  const f = timeGoalFeasibility(D);
  if (!f) return;
  if (S.targetMode === 'bodyfat' && S.goal === 'lose' && f.altGoalBf) {
    S.goalBf = f.altGoalBf;
  } else {
    S.goalWeight = f.altGoalKg;
  }
  S.goalPaceAccepted = false;
  if (S.manualAdjust < 0) S.manualAdjust = 0;
  persist(); toast('Target eased — reachable in '+S.goalWeeks+' wks comfortably'); render();
}
function goalUndoHarderPace(){
  S.manualAdjust = 0;
  S.goalPaceAccepted = false;
  persist(); toast('Pace back to normal'); render();
}
function setGoalWeeks(v){
  v = Math.max(1, Math.min(104, Number(v)||12));
  S.goalWeeks = v;
  // If they change the deadline, clear any prior accepted-harder-pace tightening
  if (S.goalPaceAccepted) {
    S.manualAdjust = 0; S.goalPaceAccepted = false;
  }
  persist(); render();
}
function clearGoalWeeks(){ S.goalWeeks = null; S.goalPaceAccepted = false; if (S.manualAdjust<0) S.manualAdjust=0; persist(); render(); }

function thisWeekTarget({bmr,td,wt,manual,sex,kg,goal,bf,checkAdj}){
  let kcal;
  if(wt.type==='diet_break'||wt.type==='recalibrate'||wt.type==='maintain')kcal=td;
  else if(wt.type==='refeed'||wt.type==='cut')kcal=Math.round(td-(wt.rate*1100));
  else if(wt.type==='surplus')kcal=Math.round(td+(wt.rate*1100));
  else kcal=td;
  kcal+=(manual||0)+(checkAdj||0);
  const floor=Math.max(bmr,sex==='male'?1500:1200);
  const floored=kcal<floor;if(floored)kcal=floor;
  const protein=proteinTarget(kg,bf,goal);
  let fat=Math.round(0.25*kcal/9);
  const fatFloor=Math.round(0.6*kg);if(fat<fatFloor)fat=fatFloor;
  const carbs=Math.max(0,Math.round((kcal-protein*4-fat*9)/4));
  return{kcal,protein,carbs,fat,floored,weekType:wt};
}
function checkinAdjustment(checkins,goal){
  const last7=checkins.slice(-7);
  if(last7.length<3)return{delta:0,msg:'Log a few check-ins so the coach can read your recovery.'};
  const avg=k=>last7.reduce((a,c)=>a+c[k],0)/last7.length;
  const h=avg('hunger'),e=avg('energy'),m=avg('mood');
  const poorSleep=last7.filter(c=>c.sleep<6.5).length;
  const stress=h>=4&&(e<=2.2||m<=2.2);
  const sp=poorSleep>=3;
  if(goal==='lose'){
    if(stress&&sp)return{delta:200,msg:'Hunger high, energy/mood low, sleep short — easing the deficit by 200 kcal. Recovery first.'};
    if(stress)return{delta:120,msg:'Hunger up and energy/mood down — softening the deficit by 120 kcal this week.'};
    if(sp)return{delta:80,msg:'Sleep has been short — adding 80 kcal to support recovery.'};
    if(h<=2&&e>=4&&m>=4)return{delta:-80,msg:'All green — coach can push 80 kcal harder if you want to accelerate.'};
  } else if(goal==='gain'){
    if(e<=2&&h<=2)return{delta:-80,msg:'Energy and appetite low — small pullback so you can eat consistently.'};
    if(h>=4&&e>=4)return{delta:60,msg:'Hungry and energetic — coach can lean into +60 kcal.'};
  }
  return{delta:0,msg:'Check-ins look stable. Holding current target.'};
}
function weeklyTrend(log){
  const arr=[...log].sort((a,b)=>a.date.localeCompare(b.date));
  if(arr.length<2)return null;
  const t0=new Date(arr[0].date).getTime();
  const xs=arr.map(e=>(new Date(e.date).getTime()-t0)/86400000),ys=arr.map(e=>e.kg);
  const n=xs.length,sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0);
  const sxx=xs.reduce((a,b)=>a+b*b,0),sxy=xs.reduce((a,b,i)=>a+b*ys[i],0);
  const d=n*sxx-sx*sx;if(d===0)return null;
  return{perWeek:((n*sxy-sx*sy)/d)*7,spanDays:xs[xs.length-1]-xs[0],n};
}

/* ----- entry math (handles meal-library entries, food-database entries, extras) ----- */
const ingScaled=(ing,amt)=>{const f=ing.a>0?amt/ing.a:0;return{kcal:ing.kcal*f,p:ing.p*f,c:ing.c*f,f:ing.f*f};};
const baseTotals=m=>m.ing.reduce((t,ing)=>({kcal:t.kcal+ing.kcal,p:t.p+ing.p,c:t.c+ing.c,f:t.f+ing.f}),{kcal:0,p:0,c:0,f:0});
function entryTotals(e){
  // e.kind: 'meal' (uses MEALS), 'food' (uses macros directly), 'built' (component list)
  let t={kcal:0,p:0,c:0,f:0};
  if(e.kind==='meal'){
    const m=MEALS[e.slot]?.[e.idx];if(!m)return t;
    t=m.ing.reduce((acc,ing,j)=>{const s=ingScaled(ing,e.amounts[j]??ing.a);return{kcal:acc.kcal+s.kcal,p:acc.p+s.p,c:acc.c+s.c,f:acc.f+s.f};},{kcal:0,p:0,c:0,f:0});
  } else if(e.kind==='food'){
    t={kcal:e.kcal,p:e.p,c:e.c,f:e.f};
  } else if(e.kind==='built'){
    // components: array of { key, amount } — multiply by per-unit macros
    (e.components||[]).forEach(c=>{
      const def=COMPONENT_BY_KEY[c.key]; if(!def) return;
      t.kcal += def.kcal * c.amount;
      t.p    += def.p    * c.amount;
      t.c    += def.c    * c.amount;
      t.f    += def.f    * c.amount;
    });
  } else if(e.kind==='recipe'){
    // recipe: macros stored directly per serving
    t={kcal:e.kcal,p:e.p,c:e.c,f:e.f};
  }
  if(Array.isArray(e.extras))e.extras.forEach(x=>{const ex=EXTRAS.find(z=>z.key===x.key);if(!ex)return;const s=ingScaled(ex,x.amount);t.kcal+=s.kcal;t.p+=s.p;t.c+=s.c;t.f+=s.f;});
  return t;
}
function planTotals(arr){return arr.reduce((a,e)=>{const t=entryTotals(e);return{kcal:a.kcal+t.kcal,p:a.p+t.p,c:a.c+t.c,f:a.f+t.f};},{kcal:0,p:0,c:0,f:0});}

/* ----- option (full-day plan) generator ----- */
function buildDay({targetKcal,tag,seed}){
  const layout=[['breakfast',0.22],['lunch',0.28],['snack',0.12],['dinner',0.26],['extra',0.12]];
  const picks=layout.map(([slot,share],i)=>{
    const pool=MEALS[slot].map((m,idx)=>({m,idx})).filter(o=>tag==='all'||o.m.tags.includes(tag));
    const list=pool.length?pool:MEALS[slot].map((m,idx)=>({m,idx}));
    const p=list[(seed+i*2)%list.length];
    const b=baseTotals(p.m);
    const sc=Math.max(0.6,Math.min(1.8,(targetKcal*share)/b.kcal));
    return{slot,idx:p.idx,m:p.m,sc,base:b};
  });
  const dayK=picks.reduce((a,p)=>a+p.base.kcal*p.sc,0);
  const f=Math.max(0.85,Math.min(1.2,targetKcal/dayK));
  return picks.map(p=>({kind:'meal',slot:p.slot,idx:p.idx,extras:[],amounts:p.m.ing.map(ing=>r1(ing.a*p.sc*f))}));
}

/* ----- Day rollover: archive yesterday's plan + clear the day bonus + reset the mode.
   Called from render() so it fires whenever any tab renders, not only Diet. ----- */
function checkDayRollover(){
  const today = todayStr();
  // Bonus expiry
  if (S.todayBonusDate && S.todayBonusDate !== today) {
    S.todayBonus = 0; S.todayBonusDate = null;
  }
  // Plan / mode rollover
  if (S.modeDate && S.modeDate !== today) {
    // Archive yesterday's plan if there is one, and it isn't already archived
    if (S.plan && S.plan.length) {
      const already = S.dayHistory.some(d => d.date === S.modeDate);
      if (!already) {
        S.dayHistory.push({ date: S.modeDate, plan: JSON.parse(JSON.stringify(S.plan)) });
        if (S.dayHistory.length > 14) S.dayHistory = S.dayHistory.slice(-14);
      }
    }
    S.plan = [];
    S.builderMode = null;
    S.modeDate = null;
    S.options = [];
    S.openEntry = null;
    persist();
  }
}

/* ----- derived numbers ----- */
function derive(){
  // Auto-clear the one-day kcal bonus if it's from a previous day
  if (S.todayBonus && S.todayBonusDate && S.todayBonusDate !== todayStr()) {
    S.todayBonus = 0; S.todayBonusDate = null;
  }
  const bonus = (S.todayBonusDate === todayStr() ? (S.todayBonus || 0) : 0);
  const bf=S.bfMode==='exact'?Math.max(4,Math.min(60,S.bf||15)):(BODY_LEVELS[S.sex].find(b=>b.key===S.bfLevel)||BODY_LEVELS[S.sex][1]).bf;
  const lbm=Math.round(S.kg*(1-bf/100));
  const bmr=bmrKatch(S.kg,bf);
  const td=tdee(bmr,S.activity);
  const regime=buildRegime({goal:S.goal,exp:S.exp,sex:S.sex,bf,weeksLogged:S.weeksLogged});
  const checkAdj=checkinAdjustment(S.checkins,S.goal);
  const wt=regime[0]||{type:'cut',rate:0.3};
  const week=thisWeekTarget({bmr,td,wt,manual:(S.manualAdjust||0)+bonus,sex:S.sex,kg:S.kg,goal:S.goal,bf,checkAdj:checkAdj.delta});
  week.todayBonus = bonus;
  let effGoalWeight=S.goalWeight;
  if(S.goal==='lose'&&S.targetMode==='bodyfat')effGoalWeight=Math.round(lbm/(1-S.goalBf/100));
  const trend=weeklyTrend(S.weightLog);
  let eta=null;
  if(S.goal!=='maintain'){
    const cur=S.weightLog.length?S.weightLog[S.weightLog.length-1].kg:S.kg;
    const need=effGoalWeight-cur;
    const wrong=(S.goal==='lose'&&need>0)||(S.goal==='gain'&&need<0);
    if(Math.abs(need)<0.3)eta={reached:true};
    else if(wrong)eta={wrong:true};
    else{
      const rates=regime.map(w=>w.rate||0);const avg=rates.reduce((a,b)=>a+b,0)/rates.length;
      if(avg>0){const weeks=Math.ceil(Math.abs(need)/avg);const date=new Date();date.setDate(date.getDate()+weeks*7);eta={weeks,date};}
    }
  }
  return{bf,lbm,bmr,td,regime,checkAdj,wt,week,effGoalWeight,trend,eta};
}

function applyTheme(mode){

  document.documentElement.setAttribute('data-theme', t);

/* Archival happens inline in renderDiet — when the stored modeDate differs
   from today, that day's plan is snapshotted into dayHistory before reset. */
function copyYesterday(){
  const today = todayStr();
  // Find the most recent day-history entry that isn't today
  const src = [...S.dayHistory].reverse().find(d=>d.date !== today);
  if (!src) { toast('No yesterday to copy from'); return; }
  if (S.plan.length && !confirm('Replace today\'s plan with '+src.date+'?')) return;
  S.plan = JSON.parse(JSON.stringify(src.plan));
  S.plan.forEach(e=>{ e.locked = true; });  // treat all as committed
  S.modeDate = today;
  if (!S.builderMode) S.builderMode = 'prebuilt';
  persist(); toast('Copied plan from '+src.date); render();
}

/* ===================== COACH MESSAGES (proactive notes) ===================== */
function coachMessage(){
  // Returns { title, body, action } or null
  const D = derive();
  const c7 = S.checkins.slice(-7);
  const c14 = S.checkins.slice(-14);
  const w = S.weightLog;

  // Mood/energy trend down
  if (c7.length >= 5) {
    const avg = k => c7.reduce((a,c)=>a+c[k],0)/c7.length;
    const mood7 = avg('mood'), energy7 = avg('energy'), hunger7 = avg('hunger');
    if (S.goal==='lose' && (mood7 < 2.5 || energy7 < 2.5)) {
      return { kind:'warn', title:'Coach: recovery check', body:'Your mood and energy have been below average this week. If it continues, the coach will ease the deficit — but you can also take a maintenance day now.', actionLabel:'Take a diet break', action:'dietBreakNow' };
    }
    if (hunger7 >= 4.3 && S.goal==='lose') {
      return { kind:'warn', title:'Coach: hunger is high', body:'Your average hunger is high this week. Try more protein, more fibre, or ask for a refeed day.', actionLabel:null };
    }
    if (mood7 >= 4 && energy7 >= 4 && hunger7 <= 2.5) {
      return { kind:'good', title:'Coach: green across the board', body:"You're crushing it this week. Perfect state to push a little harder if you want.", actionLabel:null };
    }
  }
  // Plateau
  if (w.length >= 10) {
    const recent = w.slice(-10);
    const mid = Math.floor(recent.length/2);
    const first = recent.slice(0, mid).reduce((a,e)=>a+e.kg,0) / mid;
    const last = recent.slice(mid).reduce((a,e)=>a+e.kg,0) / (recent.length - mid);
    const change = Math.abs(last - first);
    if (change < 0.3 && S.goal !== 'maintain') {
      return { kind:'warn', title:'Coach: plateau spotted', body:'Your weight hasn\'t moved much in ~10 days. That\'s normal on a cut — but if it holds a week more, try adding a walk or dropping 100 kcal.', actionLabel:null };
    }
  }
  // Streak encouragement
  const streak = checkinStreak();
  if (streak >= 3 && streak < 7 && !S.celebratedStreaks.includes(3)) {
    return { kind:'good', title:'Coach: nice consistency', body:`${streak} days of check-ins in a row. Keep going — the coach's calorie adjustments get smarter with more data.` };
  }
  return null;
}

/* ===================== STREAK CELEBRATIONS ===================== */
function checkinStreak(){
  const dates = new Set(S.checkins.map(c=>c.date));
  let streak = 0;
  const now = new Date();
  for (let i=0; i<400; i++){
    const d = new Date(now); d.setDate(now.getDate()-i);
    const ds = d.toISOString().slice(0,10);
    if (dates.has(ds)) streak++;
    else if (streak>0 || i>1) break;
  }
  return streak;
}
function maybeCelebrateStreak(){
  const s = checkinStreak();
  const milestones = [7, 30, 100, 365];
  for (const m of milestones) {
    if (s >= m && !S.celebratedStreaks.includes(m)) {
      S.celebratedStreaks.push(m);
      persist();
      showCelebration(m);
      return;
    }
  }
}

      <div class="disp" style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.55);margin-bottom:6px;position:relative">THIS WEEK · ${weekTypeLabel(D.wt)}</div>
      <div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:14px;position:relative">
        <div class="disp" style="font-size:60px;font-weight:700;line-height:.9">${D.week.kcal}</div>
        <div style="margin-bottom:8px"><div class="disp" style="font-size:16px">kcal / day</div><div style="font-size:11px;color:rgba(255,255,255,.55)">maint ≈ ${D.td} · BMR ${D.bmr} · lean ${D.lbm}kg</div></div>
      </div>
      <div class="grid3" style="position:relative">
        ${macroBox('PROTEIN',D.week.protein,D.week.protein*4,D.week.kcal,'var(--protein)')}
        ${macroBox('CARBS',D.week.carbs,D.week.carbs*4,D.week.kcal,'var(--carbs)')}
        ${macroBox('FAT',D.week.fat,D.week.fat*9,D.week.kcal,'var(--fat)')}
      </div>
      ${D.checkAdj.delta!==0?`<div style="font-size:12px;color:rgba(255,255,255,.7);margin-top:12px;position:relative">Coach applied a ${D.checkAdj.delta>0?'+':''}${D.checkAdj.delta} kcal adjustment from your check-ins.</div>`:''}
      ${D.wt.note?`<div style="font-size:12px;color:rgba(255,255,255,.7);margin-top:10px;position:relative">${D.wt.note}</div>`:''}
      ${D.eta&&D.eta.weeks?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,.12);position:relative;display:flex;justify-content:space-between;align-items:flex-end">
        <div><div class="disp" style="font-size:11px;letter-spacing:2px;color:rgba(255,255,255,.55)">${S.goalWeeks?'YOUR DEADLINE':'PROJECTED FINISH'}</div><div class="disp" style="font-size:32px;font-weight:700;line-height:1">${S.goalWeeks||D.eta.weeks} weeks</div>${S.goalWeeks && S.goalWeeks !== D.eta.weeks ? `<div style="font-size:11px;color:rgba(255,255,255,.55);margin-top:3px">coach projects ${D.eta.weeks} wks at current pace</div>` : ''}</div>
        <div style="text-align:right"><div class="disp" style="font-size:20px">${S.targetMode==='bodyfat'&&S.goal==='lose'?S.goalBf+'% bf':wdisp(D.effGoalWeight)}</div><div style="font-size:11px;color:rgba(255,255,255,.55)">~${fmtDate(D.eta.date)}</div></div>
      </div>`:''}
    </div>
    ${renderCoachCard()}
    ${renderWaterCard(D)}
    <button class="cta accent" onclick="go('diet')">SEE MY DIET →</button>
    <div class="card"><div class="sechead">Why this number</div><div style="font-size:13px;line-height:1.55">
      You're at <b>${S.kg}kg</b> / <b>${D.bf}% bf</b> with <b>${D.lbm}kg lean mass</b>. Burn ≈ <b>${D.td} kcal/day</b>.
      ${D.wt.type==='cut'?`Coach is targeting <b>${D.wt.rate.toFixed(2)} kg/wk loss</b>, safe for your body fat and experience. Protein at ${(D.week.protein/D.lbm).toFixed(1)} g per kg of lean mass to protect muscle.`:''}
      ${D.wt.type==='refeed'?`Every ~3 weeks the coach schedules a refeed — sustained deficits drop leptin and T3, intermittent higher-carb days help restore them.`:''}
      ${D.wt.type==='diet_break'?`Every ~8 weeks the coach holds <b>a full diet break</b>. MATADOR (Byrne 2018) shows breaks preserve more lean mass.`:''}
      ${D.wt.type==='surplus'?`Lean bulk capped at <b>${D.wt.rate.toFixed(2)} kg/wk</b>. Faster gains are mostly fat past this threshold (Garthe 2013).`:''}
      ${D.wt.type==='recalibrate'?`Coach pauses the surplus for a week to reassess composition.`:''}

  }
  $('tab-home').innerHTML=h;
}
function renderCoachCard(){
  const msg = coachMessage();
  if (!msg) return '';
  const bg = msg.kind==='good' ? 'var(--accentSoft)' : 'var(--amberSoft)';
  const bdr = msg.kind==='good' ? 'var(--accent)' : 'var(--amber)';
  const col = msg.kind==='good' ? 'var(--accentDark)' : 'var(--amber)';
  return `<div class="card" style="background:${bg};border:1px solid ${bdr}">
    <div class="disp" style="font-size:11px;letter-spacing:2px;color:${col};font-weight:700;margin-bottom:4px">${msg.title.toUpperCase()}</div>
    <div style="font-size:13px;line-height:1.55">${msg.body}</div>
    ${msg.actionLabel?`<button class="cta accent" style="margin:12px 0 0" onclick="coachAction${msg.action==='dietBreakNow'?'DietBreak':''}()">${msg.actionLabel}</button>`:''}
  </div>`;
}

function renderWaterCard(D){
  const goal = S.waterGoalMl || 2500;
  const done = todayWater();
  const pct = Math.min(100, done/goal*100);
  const cups = Math.max(0, Math.ceil((goal-done)/250));
  return `<div class="card">
    <div class="row" style="margin-bottom:8px">
      <div>
        <div class="disp" style="font-size:12px;letter-spacing:1.5px;font-weight:600">💧 WATER</div>
        <div class="disp" style="font-size:22px;font-weight:700;line-height:1;margin-top:2px">${done} <span style="font-size:12px;color:var(--sub);font-weight:400">/ ${goal} ml</span></div>
      </div>
      <div style="text-align:right"><div class="note">${cups>0?cups+' cup'+(cups===1?'':'s')+' to go':'goal hit ✓'}</div></div>
    </div>
    <div class="barbg" style="margin-bottom:10px"><div class="barfill" style="width:${pct}%;background:var(--protein)"></div></div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="pill ghost" style="padding:8px 12px;font-size:12px" onclick="logWater(250)">+250 ml</button>
      <button class="pill ghost" style="padding:8px 12px;font-size:12px" onclick="logWater(500)">+500 ml</button>
      <button class="pill ghost" style="padding:8px 12px;font-size:12px" onclick="logWater(750)">+750 ml</button>
      ${done>0?`<button style="padding:8px 12px;font-size:12px;color:var(--sub);text-decoration:underline" onclick="undoLastWater()">undo last</button>`:''}
    </div>
  </div>`;
}

function goalDetail(D){
  let out=`<div class="lbl">Aim for</div><div class="seg" style="margin-bottom:12px">${[['weight','Weight'],['bodyfat','Body fat %']].map(([k,l])=>`<button class="${S.targetMode===k?'on':''}" onclick="set('targetMode','${k}')">${l}</button>`).join('')}</div>`;
  if(S.targetMode==='bodyfat'&&S.goal==='lose'){
    out+=`<div class="lbl">Target body fat %</div>${stepper('goalBf',5,40,'%',S.goalBf)}<div class="note" style="margin-top:6px">≈ ${wdisp(D.effGoalWeight)} when you reach ${S.goalBf}% bf · lean mass ${D.lbm} kg.</div>`;
  } else if(S.targetMode==='bodyfat'&&S.goal==='gain'){
    out+=`<div class="lbl">Don't exceed</div>${stepper('goalBfGain',8,30,'%',S.goalBfGain)}<div class="note" style="margin-top:6px">Coach softens the surplus if you approach this cap.</div>`;
  } else {
    out+=`<div class="lbl">Goal weight</div>${S.units==='metric'?stepper('goalWeight',35,250,'kg',S.goalWeight):`<div class="stepper"><button onclick="adj('goalWeight',-0.45,35,250)">−</button><div class="val">${lbsOf(S.goalWeight)}<small> lb</small></div><button onclick="adj('goalWeight',0.45,35,250)">+</button></div>`}`;
  }
  // ---- Time-goal section ----
  out += goalTimeDetail(D);
  return out;
}

function goalTimeDetail(D){
  // Show the weeks stepper and (if set) the feasibility card
  const hasWeeks = S.goalWeeks && S.goalWeeks > 0;
  let out = `<div class="lbl" style="margin-top:14px">When do you want to reach it?</div>`;
  if (!hasWeeks) {
    out += `<div class="row" style="gap:8px;margin-bottom:6px"><button class="pill solid" style="flex:1" onclick="setGoalWeeks(12)">Set a deadline</button><div class="note" style="flex:2;font-size:11px">Optional. The coach checks if your date is realistic and gives you options if it isn't.</div></div>`;
    return out;
  }
  const targetDate = new Date(); targetDate.setDate(targetDate.getDate() + S.goalWeeks * 7);
  out += `<div class="row" style="gap:10px;margin-bottom:8px;align-items:center">
    <div class="stepper" style="flex:1"><button onclick="setGoalWeeks(${Math.max(1,S.goalWeeks-1)})">−</button><div class="val">${S.goalWeeks}<small> wks</small></div><button onclick="setGoalWeeks(${S.goalWeeks+1})">+</button></div>
    <button style="font-size:11px;color:var(--sub);text-decoration:underline;padding:0 4px" onclick="clearGoalWeeks()">no deadline</button>
  </div>
  <div class="note" style="margin-bottom:10px">≈ ${fmtDate(targetDate)}</div>`;

  const f = timeGoalFeasibility(D);
  if (!f) return out;
  if (f.verdict === 'reached') {
    out += `<div class="card" style="background:var(--accentSoft);border:1px solid var(--accent);padding:12px 14px;margin-bottom:0">
      <div style="font-size:13px;font-weight:600;color:var(--accentDark)">✓ You're at goal</div>
      <div class="note" style="margin-top:3px">Current weight matches your target. Consider changing the goal.</div>
    </div>`;
    return out;
  }
  if (f.verdict === 'wrongdir') {
    out += `<div class="card" style="background:var(--amberSoft);border:1px solid var(--amber);padding:12px 14px;margin-bottom:0">
      <div style="font-size:13px;font-weight:600;color:var(--amber)">⚠ Direction mismatch</div>
      <div class="note" style="margin-top:3px">You're set to <b>${S.goal}</b> but your goal weight is on the other side of where you are now. Fix the goal or switch to maintain.</div>
    </div>`;
    return out;
  }

  const unit = S.units === 'metric' ? 'kg' : 'lb';
  const paceDisp = v => S.units === 'metric' ? v.toFixed(2)+' kg/wk' : (v*2.20462).toFixed(2)+' lb/wk';
  const kgDisp = v => S.units === 'metric' ? v.toFixed(1)+' kg' : lbsOf(v)+' lb';

  if (f.verdict === 'green') {
    out += `<div class="card" style="background:var(--accentSoft);border:1px solid var(--accent);padding:12px 14px;margin-bottom:0">
      <div class="row"><div class="disp" style="font-size:11px;letter-spacing:1.5px;color:var(--accentDark);font-weight:700">✓ COMFORTABLE</div><div style="font-size:11px;color:var(--accentDark)">achievable</div></div>
      <div style="font-size:13px;line-height:1.55;margin-top:6px">You need <b>${paceDisp(f.requiredPace)}</b> — safely within the ${paceDisp(f.safeCeiling)} ceiling for your body. Coach will use a gentle deficit.</div>
    </div>`;
    return out;
  }
  if (f.verdict === 'amber') {
    out += `<div class="card" style="background:var(--amberSoft);border:1.5px solid var(--amber);padding:12px 14px;margin-bottom:0">
      <div class="row"><div class="disp" style="font-size:11px;letter-spacing:1.5px;color:var(--amber);font-weight:700">⚠ ACHIEVABLE BUT HARD</div><div style="font-size:11px;color:var(--amber)">above safe pace</div></div>
      <div style="font-size:13px;line-height:1.55;margin-top:6px">To hit ${kgDisp(Math.abs(f.needKg))} of change in ${S.goalWeeks} weeks you'd need <b>${paceDisp(f.requiredPace)}</b>. The safe ceiling for your body is <b>${paceDisp(f.safeCeiling)}</b>. Doable, but hunger and mood will suffer.</div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="pill ghost" style="flex:1;min-width:140px" onclick="goalPushDate()">📅 Push to ${f.safeWeeks} wks</button>
        ${f.altGoalBf?`<button class="pill ghost" style="flex:1;min-width:140px" onclick="goalLowerTarget()">🎯 Ease target to ${f.altGoalBf}% bf</button>`:`<button class="pill ghost" style="flex:1;min-width:140px" onclick="goalLowerTarget()">🎯 Ease target to ${kgDisp(f.altGoalKg)}</button>`}
      </div>
      <div style="margin-top:8px">
        ${S.goalPaceAccepted?`<div class="row"><div class="note" style="flex:1;color:var(--amber);font-weight:600">✓ Harder pace accepted · deficit tightened</div><button style="font-size:11px;color:var(--sub);text-decoration:underline" onclick="goalUndoHarderPace()">undo</button></div>`:`<button class="pill solid" style="width:100%;background:var(--amber)" onclick="goalAcceptHarderPace()">Accept the harder pace — tighten deficit</button>`}
      </div>
    </div>`;
    return out;
  }
  // red
  out += `<div class="card" style="background:#FDECEC;border:1.5px solid var(--fat);padding:12px 14px;margin-bottom:0">
    <div class="row"><div class="disp" style="font-size:11px;letter-spacing:1.5px;color:#9B2A2A;font-weight:700">✕ NOT ACHIEVABLE SAFELY</div><div style="font-size:11px;color:#9B2A2A">exceeds ceiling</div></div>
    <div style="font-size:13px;line-height:1.55;margin-top:6px">You'd need <b>${paceDisp(f.requiredPace)}</b> to lose ${kgDisp(f.needKg)} in ${S.goalWeeks} weeks. The absolute ceiling for your body is <b>${paceDisp(f.aggressiveCeiling)}</b>. Faster than that means real muscle loss, gallstones, and rebound.</div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="pill solid" style="flex:1;min-width:140px" onclick="goalPushDate()">📅 Push to ${f.safeWeeks} wks</button>
      ${f.altGoalBf?`<button class="pill solid" style="flex:1;min-width:140px" onclick="goalLowerTarget()">🎯 Ease target to ${f.altGoalBf}% bf</button>`:`<button class="pill solid" style="flex:1;min-width:140px" onclick="goalLowerTarget()">🎯 Ease target to ${kgDisp(f.altGoalKg)}</button>`}
    </div>
    <div class="note" style="margin-top:8px;color:#9B2A2A;font-size:11px">"Accept" isn't offered here — this pace isn't safe. Pick one of the two above, or set no deadline.</div>
  </div>`;
  return out;
}
function setGoal(g){
  S.goal=g;
  if(g==='lose'&&S.goalWeight>=S.kg)S.goalWeight=Math.max(40,S.kg-5);
  if(g==='gain'){S.targetMode='weight';if(S.goalWeight<=S.kg)S.goalWeight=S.kg+5;}
  S.manualAdjust=0;persist();render();
}
function startPlan(){S.started=true;persist();toast('Plan updated');render();}
function stepper(k,min,max,suf,val){return `<div class="stepper"><button onclick="adj('${k}',-1,${min},${max})">−</button><div class="val">${val}<small> ${suf}</small></div><button onclick="adj('${k}',1,${min},${max})">+</button></div>`;}
function macroBox(label,g,kc,total,color){return `<div class="mbox"><div style="width:22px;height:4px;background:${color};border-radius:2px;margin-bottom:6px"></div><div class="disp" style="font-size:24px;font-weight:700;line-height:1">${g}<span style="font-size:12px">g</span></div><div style="font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.6)">${label}</div><div style="font-size:10px;color:rgba(255,255,255,.4)">${Math.round(kc/total*100)}% cals</div></div>`;}

/* ===================== DIET ===================== */
function renderDiet(){
  if(!S.started){$('tab-diet').innerHTML=`<div class="card"><div class="note">Set up your plan on Home first.</div></div>`;return;}
  const D=derive();
  const tot=planTotals(S.plan);
  const rem=D.week.kcal-tot.kcal;
  const tags=[['all','Any'],['highprotein','High protein'],['lowcarb','Low carb'],['veg','Vegetarian'],['egyptian','Egyptian'],['quick','Quick']];

  // Day rollover happens in render() → checkDayRollover(). At this point S is up-to-date.

  let h=`<div class="stickbar">
    <div class="row" style="margin-bottom:10px;align-items:flex-start">
      <div><div class="disp" style="font-size:14px;font-weight:600;letter-spacing:1px">TODAY'S DIET</div><div style="font-size:11px;color:var(--sub)">${new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'})}</div></div>
      <div style="text-align:right"><div class="disp" style="font-size:14px"><b style="font-size:20px">${r0(tot.kcal)}</b><span style="color:var(--sub)"> / ${D.week.kcal}</span></div><div style="font-size:12px;color:${rem<0?'var(--fat)':'var(--good)'};font-weight:600">${rem>=0?r0(rem)+' left':r0(-rem)+' over'}</div></div>
    </div>
    <div class="grid3">${miniBar('P',tot.p,D.week.protein,'var(--protein)')}${miniBar('C',tot.c,D.week.carbs,'var(--carbs)')}${miniBar('F',tot.f,D.week.fat,'var(--fat)')}</div>
    ${D.week.todayBonus ? `<div style="margin-top:10px;padding:7px 10px;background:var(--amberSoft);border:1px solid var(--amber);border-radius:8px;display:flex;justify-content:space-between;align-items:center;gap:8px"><div style="font-size:12px;color:var(--amber);font-weight:600">⚠ Today's target ${D.week.todayBonus>0?'+':''}${r0(D.week.todayBonus)} kcal · resets tomorrow</div><button onclick="clearTodayBonus()" style="font-size:11px;color:var(--amber);text-decoration:underline">undo</button></div>` : ''}
  </div>`;

  /* ----- MODE GATE ----- */
  if (!S.builderMode) {
    h += renderModeChooser(D);
    $('tab-diet').innerHTML = h;
    return;
  }

  /* ----- Active mode banner + change-mode button ----- */
  h += `<div class="row" style="margin-bottom:14px;padding:10px 12px;background:var(--accentSoft);border-radius:10px;gap:10px">
    <div style="font-size:12px;color:var(--accentDark);flex:1;min-width:0"><b>${S.builderMode==='prebuilt'?'Pre-built plans':'Step-by-step builder'}</b></div>
    <button onclick="switchModeRequest()" style="font-size:12px;color:var(--accent);font-weight:700;padding:4px 10px;border:1px solid var(--accent);border-radius:99px;background:var(--card);flex:0 0 auto">↔ Change mode</button>
  </div>`;

  /* ----- Quick actions row: cookbook, copy yesterday, saved meals ----- */
  const hasHistory = [...S.dayHistory].reverse().find(d=>d.date !== todayStr());
  h += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
    <button class="pill ghost" style="flex:1;min-width:120px" onclick="go('cookbook')">📖 Cookbook</button>
    ${hasHistory ? `<button class="pill ghost" style="flex:1;min-width:120px" onclick="copyYesterday()">↻ Copy ${hasHistory.date===yesterdayStr()?'yesterday':hasHistory.date}</button>` : ''}
    ${S.savedMeals.length ? `<button class="pill ghost" style="flex:1;min-width:120px" onclick="openSavedMeals()">💾 My meals (${S.savedMeals.length})</button>` : ''}
  </div>`;

  /* ----- Water card ----- */
  const waterMl = todayWater();
  const waterGoal = S.waterGoalMl || 2500;
  const waterPct = Math.min(100, Math.round(waterMl / waterGoal * 100));
  h += `<div class="card" style="padding:14px;margin-bottom:14px">
    <div class="row" style="margin-bottom:8px">
      <div>
        <div class="disp" style="font-size:12px;letter-spacing:1.5px;color:var(--sub);font-weight:700">💧 WATER</div>
        <div style="font-size:15px;font-weight:600;margin-top:2px">${waterMl} <span style="color:var(--sub);font-size:12px">/ ${waterGoal} ml</span></div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end">
        <button class="pill ghost" style="padding:6px 11px" onclick="logWater(250)">+250</button>
        <button class="pill ghost" style="padding:6px 11px" onclick="logWater(500)">+500</button>
        <button class="pill ghost" style="padding:6px 11px" onclick="logWater(750)">+750</button>
        ${waterMl>0?`<button style="font-size:11px;color:var(--sub);text-decoration:underline;padding:0 4px" onclick="undoLastWater()">undo</button>`:''}
      </div>
    </div>
    <div class="barbg"><div class="barfill" style="width:${waterPct}%;background:${waterPct>=100?'var(--good)':'#5AA6D8'}"></div></div>
  </div>`;

  if (S.builderMode === 'stepwise') {
    h += renderStepwise(D);
  } else {
    h += `<div class="sechead">Choose a full-day plan</div>
    <div class="chips" style="margin-bottom:12px">${tags.map(([k,l])=>`<button class="chip ${S.dietTag===k?'on':''}" onclick="setDietTag('${k}')">${l}</button>`).join('')}</div>`;
    if (!S.options.length) {
      h += `<div class="card" style="text-align:center"><div style="font-size:14px;font-weight:600;margin-bottom:4px">Build my whole day</div><div class="note" style="margin-bottom:12px">3 complete plans hitting ${D.week.kcal} kcal and ${D.week.protein}g protein.</div><button class="cta accent" style="margin:0" onclick="generateDays()">⚡ GENERATE 3 PLANS</button></div>`;
    } else {
      S.options.forEach((opt,k) => { h += optionCardHTML(opt,k); });
      h += `<button class="cta ghost" onclick="generateDays()">↻ New options</button>`;
    }

    /* Quick Log only makes sense in pre-built mode — in stepwise it lives inside each slot */
    h += `<div class="card" style="background:var(--amberSoft);border:1px solid var(--amber);margin-top:12px">
      <div class="row" style="margin-bottom:10px"><div><div class="disp" style="font-size:12px;letter-spacing:2px;color:var(--amber);font-weight:700">QUICK LOG</div><div style="font-size:14px;font-weight:600;margin-top:2px">Already ate something?</div><div class="note" style="margin-top:2px">Pick a food + weight. It replaces that meal slot and the rest of the day auto-rebalances.</div></div>
      <button class="pill solid" style="background:var(--amber)" onclick="openFoodPicker()">+ FOOD</button></div>
    </div>`;
  }

  /* ----- Your day ----- */
  h+=`<div class="row" style="margin:18px 0 10px"><div class="disp" style="font-size:14px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase">Your day</div>${S.plan.length?`<button onclick="clearPlan()" style="font-size:12px;color:var(--sub);text-decoration:underline">clear</button>`:''}</div>`;
  if(S.rebalanceWarning){
    const ok=S.rebalanceWarning.ok;
    h+=`<div class="card" style="background:${ok?'var(--accentSoft)':'#FDECEC'};border:1px solid ${ok?'var(--accent)':'var(--fat)'};padding:12px 14px;margin-bottom:12px">
      <div class="disp" style="font-size:11px;letter-spacing:2px;color:${ok?'var(--accentDark)':'#9B2A2A'};font-weight:700">${ok?'✓ AUTO-REBALANCED':'⚠ CAN’T FULLY REBALANCE'}</div>
      <div style="font-size:13px;line-height:1.5;margin-top:4px">${S.rebalanceWarning.msg}</div>
    </div>`;
  }
  if(!S.plan.length){
    h+=`<div class="card" style="border-style:dashed;box-shadow:none;text-align:center;color:var(--sub);font-size:13px">Pick a plan above, add food from Quick Log, or add a meal below.</div>`;
  } else {

/* ===================== STEP-BY-STEP BUILDER =====================
   - Slots are filled in order. The next unfilled slot is "active".
   - Each slot has a kcal range based on the day's target * slot share * ±25%.
   - Picking a meal scales its portions to fit the range when possible (60%–180%).
   - If it can't fit, pass 1 warns and aborts; pass 2 will add a 4-option modal.
*/
const STEP_SHARE = { breakfast:0.22, lunch:0.28, snack:0.12, dinner:0.26, extra:0.12 };
const STEP_SLOT_FLEX = 0.25; // ±25% per slot

function nextStepSlot(){
  for (const slot of SLOTS){
    if (!S.plan.find(e=>e.slot===slot)) return slot;
  }
  return null; // all slots filled
}

function slotRange(slot, D){
  // Target kcal for this slot = remaining day target * (slot share / sum of remaining shares)
  const filledKcal = S.plan.reduce((a,e)=>a+entryTotals(e).kcal, 0);
  const remainingK = D.week.kcal - filledKcal;
  const filledP = S.plan.reduce((a,e)=>a+entryTotals(e).p, 0);
  const remainingP = D.week.protein - filledP;

  const remainingSlots = SLOTS.filter(s => !S.plan.find(e=>e.slot===s));
  const remainingShareSum = remainingSlots.reduce((a,s)=>a+STEP_SHARE[s], 0);
  if (remainingShareSum === 0) return { center:0, min:0, max:0, pMin:0, pMax:Infinity };

  const slotShare = STEP_SHARE[slot] / remainingShareSum;
  const center = Math.max(0, remainingK * slotShare);
  const min = Math.round(center * (1 - STEP_SLOT_FLEX));
  const max = Math.round(center * (1 + STEP_SLOT_FLEX));

  // Protein guidance: slot should contribute at least its share of remaining protein
  const pShare = remainingP * slotShare;
  const pMin = Math.max(0, Math.round(pShare * 0.5));
  const pMax = Math.round(pShare * 2);

  return { center: Math.round(center), min, max, pMin, pMax };
}

function renderStepwise(D){
  const next = nextStepSlot();
  let html = `<div class="sechead" style="margin-top:18px">Step-by-step builder</div>`;

  SLOTS.forEach(slot=>{
    const entry = S.plan.find(e=>e.slot===slot);
    const r = slotRange(slot, D);
    const isActive = slot === next;
    const isDone = !!entry;
    const isLocked = !isActive && !isDone;
    const slotIdx = SLOTS.indexOf(slot);

    let inner;
    if (isDone){
      const t = entryTotals(entry);
      const title = entry.kind==='meal' ? MEALS[entry.slot][entry.idx].name : entry.name;
      inner = `<div class="row" style="align-items:flex-start">
        <div style="flex:1;min-width:0;padding-right:10px">
          <div class="slotlabel">✓ ${SLOT_LABEL[slot]} — committed</div>
          <div style="font-size:14px;font-weight:600">${title}</div>
          <div class="macros"><b>${r0(t.kcal)}</b> kcal · <span style="color:var(--protein)">${r0(t.p)}P</span> · <span style="color:var(--carbs)">${r0(t.c)}C</span> · <span style="color:var(--fat)">${r0(t.f)}F</span></div>
        </div>
        <button class="pill ghost" onclick="stepEditSlot('${slot}')">Edit</button>
      </div>`;
    } else if (isActive){
      inner = `<div style="margin-bottom:10px">
        <div class="slotlabel" style="color:var(--accent)">▶ NEXT — ${SLOT_LABEL[slot]}</div>
        <div style="font-size:14px;font-weight:600;margin-top:2px">Target: ${r.center} kcal <span style="color:var(--sub);font-weight:400">(range ${r.min}–${r.max})</span></div>
        <div class="macros">Try for at least <span style="color:var(--protein);font-weight:600">${r.pMin}g protein</span> in this slot.</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="pill solid" onclick="stepOpenBuilder('${slot}')">+ Build the meal</button>
        <button class="pill ghost" onclick="stepOpenFood('${slot}')">+ Quick Log food</button>
        ${(S.savedMeals||[]).filter(m=>m.slot===slot).length ? `<button class="pill ghost" onclick="stepOpenSavedMeals('${slot}')">💾 My meals</button>` : ''}
      </div>`;
    } else {
      inner = `<div style="opacity:.5">
        <div class="slotlabel">🔒 ${SLOT_LABEL[slot]}</div>
        <div style="font-size:13px;color:var(--sub);margin-top:2px">Finish ${SLOT_LABEL[next||'previous slot']} first.</div>
      </div>`;
    }

    html += `<div class="meal" style="${isActive?'border-color:var(--accent);background:#FBFEFC':isDone?'border-color:var(--good)':''}">${inner}</div>`;
  });

  if (!next){
    const tot = planTotals(S.plan);
    const offK = tot.kcal - D.week.kcal;
    const within = Math.abs(offK) <= D.week.kcal*0.10;
    html += `<div class="card" style="background:${within?'var(--accentSoft)':'#FDECEC'};border:1px solid ${within?'var(--accent)':'var(--fat)'};margin-top:4px">
      <div class="disp" style="font-size:12px;letter-spacing:2px;color:${within?'var(--accentDark)':'#9B2A2A'};font-weight:700">${within?'✓ DAY COMPLETE':'⚠ DAY OFF TARGET'}</div>
      <div style="font-size:14px;font-weight:600;margin-top:4px">${r0(tot.kcal)} / ${D.week.kcal} kcal (${offK>=0?'+':''}${r0(offK)})</div>
      ${within?'<div class="note" style="margin-top:4px">Day is within 10% of your target.</div>':'<div class="note" style="margin-top:4px">Edit a slot above to bring the day on target.</div>'}
    </div>`;
  }
  return html;
}

function stepEditSlot(slot){
  // Remove this slot AND all later ones — downstream ranges depend on what came before
  const idx = SLOTS.indexOf(slot);
  if (!confirm(`Re-open ${SLOT_LABEL[slot]}? This also clears any meals you committed after it.`)) return;
  S.plan = S.plan.filter(e => SLOTS.indexOf(e.slot) < idx);
  S.rebalanceWarning = null;
  persist(); render();
}

function stepOpenLibrary(slot){
  S.stepLibrary = { slot, openIdx: null };

}
function stepOpenFood(slot){

  renderPicker();
}

function closeStepLibrary(){ S.stepLibrary = null; document.getElementById('modal-root').innerHTML=''; persist(); }

function renderStepLibraryModal(){
  if (!S.stepLibrary){ document.getElementById('modal-root').innerHTML=''; return; }
  const { slot, openIdx } = S.stepLibrary;

  const r = slotRange(slot, D);
  const meals = MEALS[slot];

  let body = `<div class="row" style="margin-bottom:12px"><div class="sechead" style="margin:0">${SLOT_LABEL[slot]} — pick a meal</div><button onclick="closeStepLibrary()" style="font-size:24px;color:var(--sub)">×</button></div>

  meals.forEach((m,i)=>{
    const base = baseTotals(m);
    // Preview: what scale would we apply if user picks this?
    const idealScale = r.center / base.kcal;

    const fittedK = base.kcal * clampedScale;
    const inRange = fittedK >= r.min && fittedK <= r.max;
    const note = inRange
      ? (Math.abs(clampedScale - 1) < 0.05 ? 'fits as-is' : `will scale to ${Math.round(clampedScale*100)}%`)
      : (fittedK < r.min ? `even doubled it would be ~${r0(fittedK)} kcal — below slot floor` : `even halved it would be ~${r0(fittedK)} kcal — above slot ceiling`);
    const tagsLine = (m.tags||[]).join(' · ');
    body += `<div class="meal" style="margin-bottom:8px;${inRange?'':'opacity:.6'}">

          <div style="font-size:14px;font-weight:600">${m.name}</div>
          <div class="macros"><b>${r0(base.kcal)}</b> kcal · <span style="color:var(--protein)">${base.p}P</span> · <span style="color:var(--carbs)">${base.c}C</span> · <span style="color:var(--fat)">${base.f}F</span></div>
          <div class="note" style="color:${inRange?'var(--accent)':'var(--fat)'};font-weight:600;margin-top:3px">${note}</div>
          ${tagsLine?`<div class="note" style="margin-top:2px">${tagsLine}</div>`:''}
        </div>
        <button class="pill ${inRange?'solid':'ghost'}" onclick="stepCommitMeal('${slot}',${i})" ${inRange?'':'disabled style="opacity:.5"'}>+ Add</button>
      </div>

  });

  document.getElementById('modal-root').innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeStepLibrary()"><div class="modal">${body}</div></div>`;
}

function stepCommitMeal(slot, idx){
  const m = MEALS[slot][idx];
  const base = baseTotals(m);
  const D = derive();
  const r = slotRange(slot, D);
  const idealScale = r.center / base.kcal;
  const clampedScale = Math.max(0.6, Math.min(1.8, idealScale));
  const fittedK = base.kcal * clampedScale;
  if (fittedK < r.min || fittedK > r.max){
    // Out of range — open the 4-option modal
    showOutOfRangeModal({
      kind: 'meal', slot, mealIdx: idx,
      requestedKcal: base.kcal, requestedP: base.p, requestedC: base.c, requestedF: base.f,
      range: r,
    });
    return;
  }
  const newEntry = {
    kind: 'meal', slot, idx,
    amounts: m.ing.map(ing => r1(ing.a * clampedScale)),
    extras: [], locked: true,
  };
  S.plan.push(newEntry);
  S.stepLibrary = null;
  document.getElementById('modal-root').innerHTML = '';
  persist();
  toast(`${SLOT_LABEL[slot]} committed${Math.abs(clampedScale-1)>=0.05?` (${Math.round(clampedScale*100)}%)`:''}`);
  render();
}

/* ===================== BUILD-FROM-COMPONENTS (step-by-step mode) =====================
   S.builder = {
     slot, // which slot we're filling
     picks: [{ key, amount, locked }]  // user-picked components with portion
   }
   Default behavior: when you add or remove a pick, the unlocked ones rescale so
   the meal lands at the slot's center kcal. Manually edit a portion → that pick
   becomes locked, and the others re-solve around it.
*/
function stepOpenBuilder(slot){
  S.builder = { slot, picks: [], catFilter: 'Protein' };
  renderBuilderModal();
}
function closeBuilder(){ S.builder = null; document.getElementById('modal-root').innerHTML = ''; }

function builderAddPick(key){
  if (!S.builder) return;
  if (S.builder.picks.find(p => p.key === key)) { toast('Already added — adjust its portion below'); return; }
  const def = COMPONENT_BY_KEY[key]; if (!def) return;
  S.builder.picks.push({ key, amount: def.def, locked: false });
  autoSolveBuilder();
  renderBuilderModal();
}
function builderRemovePick(idx){
  if (!S.builder) return;
  S.builder.picks.splice(idx, 1);
  autoSolveBuilder();
  renderBuilderModal();
}
function builderSetAmount(idx, val){
  if (!S.builder) return;
  let v = Number(val); if (isNaN(v) || v < 0) v = 0;
  const p = S.builder.picks[idx]; if (!p) return;
  const def = COMPONENT_BY_KEY[p.key];
  // Round to sensible step
  const step = def.u === 'pc' ? 1 : (def.u === 'ml' ? 5 : 1);
  v = Math.round(v / step) * step;
  if (v < 0) v = 0;
  p.amount = v; p.locked = true;  // manual edit locks this pick
  autoSolveBuilder();
  renderBuilderModal();
}
function builderNudge(idx, sign){
  if (!S.builder) return;
  const p = S.builder.picks[idx]; if (!p) return;
  const def = COMPONENT_BY_KEY[p.key];
  const step = def.u === 'pc' ? 1 : (def.u === 'g' ? 10 : 25);
  let v = p.amount + sign * step;
  if (v < 0) v = 0;
  p.amount = v; p.locked = true;
  autoSolveBuilder();
  renderBuilderModal();
}
function builderToggleLock(idx){
  if (!S.builder) return;
  const p = S.builder.picks[idx]; if (!p) return;
  p.locked = !p.locked;
  autoSolveBuilder();
  renderBuilderModal();
}
function builderSetCatFilter(cat){
  if (!S.builder) return;
  S.builder.catFilter = cat;
  renderBuilderModal();
}

/* Auto-solver:
   - Sum kcal contributed by LOCKED picks. That's a fixed contribution.
   - Remaining target = slotCenter - locked contribution.
   - Distribute remaining across UNLOCKED picks proportional to each pick's CURRENT amount.
     Each pick's new amount = current * (remainingTarget / currentUnlockedKcal).
   - Clamp each unlocked pick to [min, max]. If any get clamped, treat them as locked
     for this pass and re-solve. Cap at 5 iterations.
*/
function autoSolveBuilder(){
  if (!S.builder || !S.builder.picks.length) return;
  const D = derive();
  const r = slotRange(S.builder.slot, D);
  const target = r.center;
  // Work on a copy of pick amounts; we'll write back at the end
  const items = S.builder.picks.map(p => ({ ...p, def: COMPONENT_BY_KEY[p.key] })).filter(x=>x.def);
  // Treat unlocked as scalable, locked as fixed
  let lockedKcal = items.filter(x=>x.locked).reduce((a,x)=>a+x.def.kcal*x.amount, 0);
  let scalable = items.filter(x=>!x.locked);
  if (!scalable.length) {
    // Nothing to scale — leave amounts alone
  } else {
    for (let iter=0; iter<5; iter++) {
      const need = target - lockedKcal;
      const curUnlockedKcal = scalable.reduce((a,x)=>a+x.def.kcal*x.amount, 0);
      if (curUnlockedKcal <= 0) break;
      const factor = need / curUnlockedKcal;
      if (!isFinite(factor) || factor <= 0) break;
      let anyClamped = false;
      scalable.forEach(x => {
        let next = x.amount * factor;
        if (next < x.def.min) { next = x.def.min; x._justClamped = true; anyClamped = true; }
        else if (next > x.def.max) { next = x.def.max; x._justClamped = true; anyClamped = true; }
        // Round to step
        const step = x.def.u === 'pc' ? 1 : (x.def.u === 'g' ? 5 : 5);
        next = Math.round(next / step) * step;
        if (next < 0) next = 0;
        x.amount = next;
      });
      if (!anyClamped) break;
      // Move clamped picks into "locked" (for this pass), recompute lockedKcal, continue
      const newlyLocked = scalable.filter(x=>x._justClamped);
      lockedKcal += newlyLocked.reduce((a,x)=>a+x.def.kcal*x.amount, 0);
      scalable = scalable.filter(x=>!x._justClamped);
      scalable.forEach(x=>delete x._justClamped);
      if (!scalable.length) break;
    }
  }
  // Write back
  items.forEach((x,i) => { S.builder.picks[i].amount = x.amount; });
}

function builderTotals(){
  if (!S.builder) return {kcal:0,p:0,c:0,f:0};
  return S.builder.picks.reduce((a,p)=>{
    const def = COMPONENT_BY_KEY[p.key]; if (!def) return a;
    return {
      kcal: a.kcal + def.kcal * p.amount,
      p:    a.p    + def.p    * p.amount,
      c:    a.c    + def.c    * p.amount,
      f:    a.f    + def.f    * p.amount,
    };
  }, {kcal:0,p:0,c:0,f:0});
}

function renderBuilderModal(){

  if (!S.builder.picks.length) {

  /* Component picker (filtered by category) */

  const catsHtml = COMPONENT_CATS.map(cat => `<button class="chip ${S.builder.catFilter===cat?'on':''}" onclick="builderSetCatFilter('${cat}')">${cat}</button>`).join('');
  const listHtml = list.length === 0
    ? `<div class="note" style="padding:14px;text-align:center">No more ${S.builder.catFilter.toLowerCase()} components — try another category.</div>`
    : list.map(c => `<button class="foodrow" onclick="builderAddPick('${c.key}')" style="display:flex;width:100%">
        <div style="flex:1;min-width:0;text-align:left">
          <div style="font-size:13px;font-weight:600">${c.n}</div>
          <div class="macros">${c.def}${c.u==='pc'?'×':c.u} default · ${r0(c.kcal*c.def)} kcal · ${r1(c.p*c.def)}P ${r1(c.c*c.def)}C ${r1(c.f*c.def)}F</div>
        </div>
        <div style="color:var(--accent);font-size:22px;flex:0 0 auto">+</div>
      </button>`).join('');

  const body = `<div class="row" style="margin-bottom:8px"><div class="sechead" style="margin:0">${SLOT_LABEL[S.builder.slot]} — build your meal</div><button onclick="closeBuilder()" style="font-size:24px;color:var(--sub)">×</button></div>

    <!-- Slot target / running total -->
    <div class="card" style="background:${inRange?'var(--accentSoft)':'#FDECEC'};border:1.5px solid ${inRange?'var(--accent)':'var(--fat)'};padding:13px;margin-bottom:14px">
      <div class="row" style="margin-bottom:6px"><span class="disp" style="font-size:11px;letter-spacing:1.5px;color:${inRange?'var(--accentDark)':'#9B2A2A'};font-weight:700">${inRange?'✓ IN SLOT RANGE':'⚠ OUTSIDE SLOT RANGE'}</span><span class="note">target ${r.center} kcal · range ${r.min}–${r.max}</span></div>
      <div class="row" style="align-items:flex-end">
        <div><div class="disp" style="font-size:30px;font-weight:700;line-height:1">${r0(tot.kcal)}</div><div class="note">total kcal</div></div>

      </div>
    </div>

    <!-- Picked components -->

    <div class="lbl" style="margin-top:14px">Add a component</div>
    <div class="chips" style="margin-bottom:10px">${catsHtml}</div>
    <div style="max-height:36vh;overflow-y:auto;margin-bottom:14px">${listHtml}</div>

    <button class="cta accent" onclick="builderCommit()" ${S.builder.picks.length===0?'disabled style="opacity:.5"':''} style="margin:0 0 10px">+ COMMIT MEAL</button>
    ${S.builder.picks.length ? `<button class="cta ghost" onclick="saveMealFromBuilder()" style="margin:0 0 10px">💾 Save as my meal (reuse anytime)</button>` : ''}
    <button class="cta ghost" onclick="closeBuilder()" style="margin:0">Cancel</button>`;

  document.getElementById('modal-root').innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeBuilder()"><div class="modal">${body}</div></div>`;
}

function builderCommit(){
  if (!S.builder || !S.builder.picks.length) return;
  const slot = S.builder.slot;
  const D = derive();
  const r = slotRange(slot, D);
  const tot = builderTotals();
  if (tot.kcal < r.min || tot.kcal > r.max) {
    // Out of range — open the 4-option modal using the existing flow.
    // Construct a synthetic payload so the same UI handles it.
    showOutOfRangeModal({
      kind: 'built', slot,
      built: { components: S.builder.picks.map(p => ({ key: p.key, amount: p.amount })) },
      requestedKcal: tot.kcal, requestedP: tot.p, requestedC: tot.c, requestedF: tot.f,
      range: r,
    });
    return;
  }
  const components = S.builder.picks.map(p => ({ key: p.key, amount: p.amount }));
  // Build a display name from the picks (first 2-3 components)
  const namePieces = S.builder.picks.slice(0, 3).map(p => {
    const def = COMPONENT_BY_KEY[p.key]; if (!def) return '';
    return def.n.split(' ')[0];
  }).filter(Boolean);
  const name = namePieces.join(' + ') + (S.builder.picks.length>3?'…':'');
  S.plan.push({ kind: 'built', slot, name, components, extras: [], locked: true });
  S.builder = null;
  document.getElementById('modal-root').innerHTML = '';
  persist();
  toast(`${SLOT_LABEL[slot]} committed`);
  render();
}

/* ===================== OUT-OF-RANGE 4-OPTION MODAL =====================
   payload = {
     kind: 'meal'|'food',
     slot,
     mealIdx?,            // meal mode: index into MEALS[slot]
     foodPayload?,        // food mode: { food, amount, displayAmount, kcal, p, c, f }
     requestedKcal,       // unscaled / requested kcal
     requestedP, requestedC, requestedF,
     range,               // slotRange() result
   }
*/
function showOutOfRangeModal(payload){
  S.oorPayload = payload;
  renderOutOfRangeModal();
}
function closeOutOfRangeModal(){ S.oorPayload = null; document.getElementById('modal-root').innerHTML = ''; }

function renderOutOfRangeModal(){
  if (!S.oorPayload) return;
  const p = S.oorPayload;
  const k = p.requestedKcal;
  const tooHigh = k > p.range.max;
  const overshootK = tooHigh ? (k - p.range.max) : (p.range.min - k);
  // For meals, the auto-scale-to-fit option (clamped scale to fit min..max)
  let canAdjustMeal = false, suggestedScale = 1, scaledK = k;
  if (p.kind === 'meal') {
    const baseK = p.requestedKcal;
    const target = p.range.center;
    const ideal = target / baseK;
    const clamped = Math.max(0.6, Math.min(1.8, ideal));
    const fitted = baseK * clamped;
    canAdjustMeal = fitted >= p.range.min && fitted <= p.range.max;
    suggestedScale = clamped; scaledK = fitted;
  }
  // For food, "adjust the meal" = suggest a new weight that lands at center of slot
  let canAdjustFood = false, suggestedAmount = 0;
  if (p.kind === 'food') {
    const f = p.foodPayload.food;
    const perUnitK = f.kcal;
    const isWeight = f.u === '100g' || f.u === 'ml';
    if (isWeight) {
      // suggest amount that lands at slot center
      suggestedAmount = Math.max(1, Math.round((p.range.center / perUnitK) * 100));
      // result kcal at that amount
      const factor = suggestedAmount / 100;
      const newK = perUnitK * factor;
      canAdjustFood = newK >= p.range.min && newK <= p.range.max;
    } else {
      // fixed-unit foods (1 egg, 1 banana) — can't fractionally adjust
      canAdjustFood = false;
    }
  }
  // For built meals, "adjust" rescales all components proportionally
  let canAdjustBuilt = false, builtScale = 1, builtScaledK = k;
  if (p.kind === 'built') {
    const baseK = p.requestedKcal;
    const factor = p.range.center / baseK;
    // Simulate the rescale with clamps
    let totK = 0;
    p.built.components.forEach(c => {
      const def = COMPONENT_BY_KEY[c.key]; if (!def) return;
      let next = c.amount * factor;
      next = Math.max(def.min, Math.min(def.max, next));
      const step = def.u === 'pc' ? 1 : (def.u === 'g' ? 5 : 5);
      next = Math.round(next / step) * step;
      totK += def.kcal * next;
    });
    canAdjustBuilt = totK >= p.range.min && totK <= p.range.max;
    builtScale = factor; builtScaledK = totK;
  }

  // Smaller meals filter (for swap option) — meals in same slot whose base kcal would fit after scaling
  // Only offered for 'meal' kind (swap to another library meal); built and food don't have an equivalent library.
  let smallerMeals = [];
  if (tooHigh && p.kind === 'meal') {
    const slot = p.slot;
    smallerMeals = MEALS[slot].map((m,i)=>({m,i,k:baseTotals(m).kcal}))
      .filter(o => {
        const ideal = p.range.center / o.k;
        const clamped = Math.max(0.6, Math.min(1.8, ideal));
        const fitted = o.k * clamped;
        return fitted >= p.range.min && fitted <= p.range.max;
      })
      .sort((a,b)=>a.k-b.k)
      .slice(0, 4);
  }

  const title = p.kind === 'meal'
    ? MEALS[p.slot][p.mealIdx].name
    : p.kind === 'built'
    ? p.built.components.map(c=>COMPONENT_BY_KEY[c.key]?.n.split(' ')[0]).filter(Boolean).join(' + ')
    : p.foodPayload.food.n + ' (' + p.foodPayload.displayAmount + ')';

  let body = `<div class="row" style="margin-bottom:8px"><div class="sechead" style="margin:0">${SLOT_LABEL[p.slot]} — out of range</div><button onclick="closeOutOfRangeModal()" style="font-size:24px;color:var(--sub)">×</button></div>
    <div class="card" style="background:#FDECEC;border:1px solid var(--fat);padding:12px 14px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:600;margin-bottom:4px">${title}</div>
      <div style="font-size:13px">This is <b>${r0(k)} kcal</b> but the slot range is <b>${p.range.min}–${p.range.max} kcal</b>.</div>
      <div class="note" style="margin-top:4px">${tooHigh ? `${r0(overshootK)} kcal over the slot ceiling.` : `${r0(overshootK)} kcal below the slot floor.`}</div>
    </div>
    <div class="lbl" style="margin-bottom:8px">What would you like to do?</div>`;

  // Option 1: adjust the meal/food/built
  if (p.kind === 'meal' && canAdjustMeal) {
    body += `<button class="card" onclick="orAdjustMeal()" style="display:block;width:100%;text-align:left;padding:14px;margin-bottom:10px;border:1.5px solid var(--accent);cursor:pointer">
      <div class="disp" style="font-size:13px;letter-spacing:1.5px;color:var(--accent);font-weight:700">1 · ADJUST THE MEAL</div>
      <div style="font-size:14px;font-weight:600;margin-top:3px">Scale portion to <b>${Math.round(suggestedScale*100)}%</b> (~${r0(scaledK)} kcal)</div>
      <div class="note" style="margin-top:2px">Every ingredient resizes proportionally to fit the slot.</div>
    </button>`;
  } else if (p.kind === 'built' && canAdjustBuilt) {
    body += `<button class="card" onclick="orAdjustMeal()" style="display:block;width:100%;text-align:left;padding:14px;margin-bottom:10px;border:1.5px solid var(--accent);cursor:pointer">
      <div class="disp" style="font-size:13px;letter-spacing:1.5px;color:var(--accent);font-weight:700">1 · ADJUST THE COMPONENTS</div>
      <div style="font-size:14px;font-weight:600;margin-top:3px">Rescale to <b>${Math.round(builtScale*100)}%</b> (~${r0(builtScaledK)} kcal)</div>
      <div class="note" style="margin-top:2px">All picked components resize proportionally, respecting each one's portion limits.</div>
    </button>`;
  } else if (p.kind === 'food' && canAdjustFood) {
    body += `<button class="card" onclick="orAdjustMeal()" style="display:block;width:100%;text-align:left;padding:14px;margin-bottom:10px;border:1.5px solid var(--accent);cursor:pointer">
      <div class="disp" style="font-size:13px;letter-spacing:1.5px;color:var(--accent);font-weight:700">1 · ADJUST THE WEIGHT</div>
      <div style="font-size:14px;font-weight:600;margin-top:3px">Change to <b>${suggestedAmount}${p.foodPayload.food.u==='100g'?'g':'ml'}</b> to land at slot center</div>
      <div class="note" style="margin-top:2px">Resizes the portion to fit the slot.</div>
    </button>`;
  } else {
    const label = p.kind==='food'?'WEIGHT':p.kind==='built'?'COMPONENTS':'MEAL';
    const why = p.kind==='food'?'This is a per-unit food (like a piece of fruit) — can\'t partial-portion it. Try a different option.'
      : p.kind==='built'?'Components can\'t be rescaled to fit while respecting their portion limits. Try a different option.'
      : 'Even the maximum portion adjustment can\'t fit it into the slot.';
    body += `<div class="card" style="padding:14px;margin-bottom:10px;border:1.5px solid var(--line);opacity:.5">
      <div class="disp" style="font-size:13px;letter-spacing:1.5px;color:var(--sub);font-weight:700">1 · ADJUST THE ${label}</div>
      <div class="note" style="margin-top:3px">${why}</div>
    </div>`;
  }

  // Option 2: adjust today's plan
  body += `<button class="card" onclick="orAdjustPlan()" style="display:block;width:100%;text-align:left;padding:14px;margin-bottom:10px;border:1.5px solid var(--amber);cursor:pointer">
    <div class="disp" style="font-size:13px;letter-spacing:1.5px;color:var(--amber);font-weight:700">2 · ADJUST TODAY'S PLAN</div>
    <div style="font-size:14px;font-weight:600;margin-top:3px">Keep this ${p.kind==='food'?'food':'meal'} full-size — today's target ${tooHigh?'goes up by':'drops by'} <b>${r0(overshootK)} kcal</b></div>
    <div class="note" style="margin-top:2px">Just for today. Tomorrow snaps back to your normal target.</div>
  </button>`;

  // Option 3: swap to smaller meal — only meaningful for kind:'meal' (built/food don't have library)
  if (p.kind === 'meal' && tooHigh && smallerMeals.length > 0) {
    body += `<div class="card" style="padding:14px;margin-bottom:10px;border:1.5px solid var(--line)">
      <div class="disp" style="font-size:13px;letter-spacing:1.5px;color:var(--ink);font-weight:700">3 · SWAP TO A SMALLER MEAL</div>
      <div class="note" style="margin-top:3px;margin-bottom:8px">Pick one of these that fits this slot:</div>`;
    smallerMeals.forEach(o => {
      body += `<button onclick="orSwapMeal(${o.i})" style="display:block;width:100%;text-align:left;padding:9px 12px;margin-bottom:6px;border:1px solid var(--line);border-radius:10px;background:var(--card);cursor:pointer">
        <div style="font-size:13px;font-weight:600">${o.m.name}</div>
        <div class="macros">${r0(o.k)} kcal base</div>
      </button>`;
    });
    body += `</div>`;
  } else if (p.kind === 'meal' && tooHigh) {
    body += `<div class="card" style="padding:14px;margin-bottom:10px;border:1.5px solid var(--line);opacity:.5">
      <div class="disp" style="font-size:13px;letter-spacing:1.5px;color:var(--sub);font-weight:700">3 · SWAP TO A SMALLER MEAL</div>
      <div class="note" style="margin-top:3px">No smaller meals in this slot's library that fit. Try a Quick Log food instead, or pick another option.</div>
    </div>`;
  }

  // Option 4: cancel
  body += `<button class="cta ghost" onclick="closeOutOfRangeModal()" style="margin:0">Cancel — go back</button>`;

  document.getElementById('modal-root').innerHTML = `<div class="modal-bg" onclick="if(event.target===this)closeOutOfRangeModal()"><div class="modal">${body}</div></div>`;
}

function orAdjustMeal(){
  const p = S.oorPayload; if (!p) return;
  if (p.kind === 'meal') {
    // Find the scale that lands at center, clamped
    const baseK = p.requestedKcal;
    const ideal = p.range.center / baseK;
    const scale = Math.max(0.6, Math.min(1.8, ideal));
    const fittedK = baseK * scale;
    if (fittedK < p.range.min || fittedK > p.range.max) {
      // Can't fit even at the clamp limits — don't commit silently
      alert("Even scaled to the portion limits, this meal won't fit the slot. Try another option.");
      return;
    }
    const m = MEALS[p.slot][p.mealIdx];
    S.plan.push({
      kind:'meal', slot:p.slot, idx:p.mealIdx,
      amounts: m.ing.map(ing => r1(ing.a * scale)),
      extras: [], locked: true,
    });
    toast(`${SLOT_LABEL[p.slot]} committed (${Math.round(scale*100)}%)`);
  } else if (p.kind === 'built') {
    // Scale all components proportionally to land at slot center, respecting each component's min/max.
    const baseK = p.requestedKcal;
    const factor = p.range.center / baseK;
    const newComps = p.built.components.map(c => {
      const def = COMPONENT_BY_KEY[c.key];
      if (!def) return c;
      let next = c.amount * factor;
      next = Math.max(def.min, Math.min(def.max, next));
      const step = def.u === 'pc' ? 1 : (def.u === 'g' ? 5 : 5);
      next = Math.round(next / step) * step;
      return { key: c.key, amount: next };
    });
    // Recompute total
    const newK = newComps.reduce((a,c) => {
      const def = COMPONENT_BY_KEY[c.key]; return a + (def ? def.kcal * c.amount : 0);
    }, 0);
    if (newK < p.range.min || newK > p.range.max) {
      alert("Scaling the components couldn't bring this meal into the slot range. Try another option.");
      return;
    }
    const namePieces = newComps.slice(0,3).map(c => COMPONENT_BY_KEY[c.key]?.n.split(' ')[0]).filter(Boolean);
    const name = namePieces.join(' + ') + (newComps.length>3?'…':'');
    S.plan.push({ kind:'built', slot:p.slot, name, components: newComps, extras:[], locked:true });
    toast(`${SLOT_LABEL[p.slot]} committed (rescaled)`);
  } else {
    // food: change the weight to slot center
    const f = p.foodPayload.food;
    const newAmount = Math.max(1, Math.round((p.range.center / f.kcal) * 100));
    const factor = newAmount / 100;
    const newK = f.kcal * factor;
    if (newK < p.range.min || newK > p.range.max) {
      alert("Can't find a weight that lands in the slot range. Try another option.");
      return;
    }
    const displayAmount = f.u === '100g' ? newAmount+'g' : newAmount+'ml';
    S.plan.push({
      kind:'food', slot:p.slot, name:f.n, displayAmount, extras:[], locked:true,
      kcal: newK, p: f.p*factor, c: f.c*factor, f: f.f*factor,
    });
    toast(`${SLOT_LABEL[p.slot]} committed (${newAmount}${f.u==='100g'?'g':'ml'})`);
  }
  S.oorPayload = null; S.stepLibrary = null; S.builder = null;
  document.getElementById('modal-root').innerHTML = '';
  persist(); render();
}

function orAdjustPlan(){
  const p = S.oorPayload; if (!p) return;
  // Determine the kcal bump — overshoot from the slot's *center*, not the boundary,
  // so the day target absorbs cleanly.
  const k = p.requestedKcal;
  const bump = Math.round(k - p.range.center);
  S.todayBonus = (S.todayBonusDate === todayStr() ? (S.todayBonus || 0) : 0) + bump;
  S.todayBonusDate = todayStr();

  // Commit the entry as requested (no scaling, no clamp)
  if (p.kind === 'meal') {
    const m = MEALS[p.slot][p.mealIdx];
    S.plan.push({
      kind:'meal', slot:p.slot, idx:p.mealIdx,
      amounts: m.ing.map(ing => ing.a),
      extras: [], locked: true,
    });
  } else if (p.kind === 'built') {
    const namePieces = p.built.components.slice(0,3).map(c => COMPONENT_BY_KEY[c.key]?.n.split(' ')[0]).filter(Boolean);
    const name = namePieces.join(' + ') + (p.built.components.length>3?'…':'');
    S.plan.push({ kind:'built', slot:p.slot, name, components: p.built.components.slice(), extras:[], locked:true });
  } else {
    const f = p.foodPayload.food;
    const fp = p.foodPayload;
    S.plan.push({
      kind:'food', slot:p.slot, name:f.n, displayAmount:fp.displayAmount, extras:[], locked:true,
      kcal: fp.kcal, p: fp.p, c: fp.c, f: fp.f,
    });
  }
  S.oorPayload = null; S.stepLibrary = null; S.builder = null;
  document.getElementById('modal-root').innerHTML = '';
  persist();
  toast(`Today's target ${bump>=0?'+':''}${bump} kcal · resets tomorrow`);
  render();
}

function setExtraAmt(i,j,val){let v=Number(val);if(isNaN(v)||v<0)v=0;S.plan[i].extras[j].amount=Math.round(v*100)/100;S.plan[i].locked=true;rebalanceUnlocked();persist();render();}
function nudgeExtra(i,j,d){let v=(S.plan[i].extras[j].amount||0)+d;if(v<0)v=0;S.plan[i].extras[j].amount=Math.round(v*100)/100;S.plan[i].locked=true;rebalanceUnlocked();persist();render();}

/* ----- built-entry per-component adjust ----- */
function setBuiltComp(i, j, val){
  const e = S.plan[i]; if (!e || e.kind !== 'built') return;
  const c = e.components[j]; if (!c) return;
  let v = Number(val); if (isNaN(v) || v < 0) v = 0;
  const def = COMPONENT_BY_KEY[c.key];
  if (def) { const step = def.u === 'pc' ? 1 : 5; v = Math.round(v / step) * step; if (v < 0) v = 0; }
  c.amount = v; e.locked = true;
  rebalanceUnlocked(); persist(); render();
}
function nudgeBuiltComp(i, j, d){
  const e = S.plan[i]; if (!e || e.kind !== 'built') return;
  const c = e.components[j]; if (!c) return;
  c.amount = Math.max(0, c.amount + d); e.locked = true;
  rebalanceUnlocked(); persist(); render();
}
function removeBuiltComp(i, j){
  const e = S.plan[i]; if (!e || e.kind !== 'built') return;
  e.components.splice(j, 1); e.locked = true;
  // If all components removed, drop the entry entirely
  if (!e.components.length) S.plan.splice(i, 1);
  rebalanceUnlocked(); persist(); render();
}

/* ===================== auto-rebalance engine =====================
   Goal: when the user edits a meal, the OTHER unedited meals scale to
   bring day kcal & protein within ±10% of their targets.
   - Only meals with kind='meal' and !locked are scaled.
   - Scaling multiplies that meal's amounts[] by a factor.
   - Per-meal factor is clamped to [0.6, 1.8] (no zero-portion meals).
   - We iterate up to ~12 passes (convergence is fast — usually 2–3).
   - If we can't get inside ±10%, S.rebalanceWarning is set with detail.
*/
function rebalanceUnlocked(){
  S.rebalanceWarning=null;
  const D=derive();
  const targetK=D.week.kcal, targetP=D.week.protein;
  const tolK=targetK*0.10, tolP=targetP*0.10;
  const tot=()=>planTotals(S.plan);
  let cur=tot();
  // are we already in range?
  if(Math.abs(cur.kcal-targetK)<=tolK && Math.abs(cur.p-targetP)<=tolP) return;
  // identify scalable entries (meal-kind, unlocked, has amounts)
  const ix=[];
  S.plan.forEach((e,i)=>{if(e.kind==='meal'&&!e.locked&&Array.isArray(e.amounts)&&e.amounts.length)ix.push(i);});
  if(!ix.length){
    S.rebalanceWarning={msg:'All meals are locked — unlock some to let the day rebalance, or add another meal.',totals:cur};
    return;
  }
  // remember each entry's *current* baseline so per-iteration clamps stick
  const baselines=ix.map(i=>S.plan[i].amounts.slice());
  const clampLow=0.6, clampHigh=1.8;
  // Track cumulative scale per entry vs baseline so clamps work right
  const cumScale=new Array(ix.length).fill(1);
  for(let pass=0;pass<12;pass++){
    cur=tot();
    const kcalGap=targetK-cur.kcal;
    if(Math.abs(kcalGap)<=tolK*0.5)break;
    // sum of kcal currently coming from scalable entries
    let scalableK=0;
    ix.forEach((i,n)=>{const t=entryTotals(S.plan[i]);scalableK+=t.kcal;});
    if(scalableK<=0)break;
    // compute target factor: scale group so it eats the gap
    let f=(scalableK+kcalGap)/scalableK;
    if(!isFinite(f)||f<=0)break;
    // apply with clamps per entry
    let appliedAny=false;
    ix.forEach((i,n)=>{
      let want=cumScale[n]*f;
      want=Math.max(clampLow,Math.min(clampHigh,want));
      if(Math.abs(want-cumScale[n])<0.005)return;
      const ratio=want/cumScale[n];
      cumScale[n]=want;
      S.plan[i].amounts=S.plan[i].amounts.map(a=>Math.round(a*ratio*100)/100);
      appliedAny=true;
    });
    if(!appliedAny)break;
  }
  cur=tot();
  const offK=cur.kcal-targetK, offP=cur.p-targetP;
  // Protein gets a relaxed rule: only warn if too LOW (high protein is rarely a problem).
  const proteinLow=offP<-tolP;
  if(Math.abs(offK)>tolK||proteinLow){
    const parts=[];
    if(Math.abs(offK)>tolK)parts.push(`${offK>0?'+':''}${r0(offK)} kcal off target`);
    if(proteinLow)parts.push(`${r0(offP)} g protein under target`);
    S.rebalanceWarning={msg:'Auto-rebalance hit its limits — '+parts.join(', ')+'. Adjust a locked meal or add/remove an item.',totals:cur};
  } else {
    S.rebalanceWarning={ok:true,msg:`Auto-rebalanced the rest of your day. Now at ${r0(cur.kcal)} kcal / ${r0(cur.p)}g protein — within 10% of target.`,totals:cur};
  }
}

        ${stepwise && !inRange?`<div class="note" style="margin-top:6px;color:#9B2A2A">${macros.kcal<rangeInfo.min?'Below slot floor — increase the weight':'Above slot ceiling — decrease the weight'}</div>`:''}
